    @font-face {
      font-family: 'NeueHaas';
      src: url('../../../assets/fonts/Inter-VariableFont.ttf') format('truetype');
      font-weight: 100 900;
      font-style: normal;
    }

    /* ============================================================
       RESET
       ============================================================ */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'NeueHaas', 'Inter', sans-serif;
    }

    /* ============================================================
       POST CONTAINER
       ============================================================ */
    .fluid-post {
      --accent: #FF8B58;
      position: relative;
      overflow: hidden;
      background: #000;
      color: #ffffff;
      font-family: 'NeueHaas', 'Inter', sans-serif;
    }

    .fluid-post--instagram {
      width: 1080px;
      height: 1080px;
    }

    /* ============================================================
       BRUSHSTROKES
       ============================================================ */
    .fluid-problem-first-brush {
      position: absolute;
      mix-blend-mode: screen;
      opacity: 0.18;
      pointer-events: none;
      z-index: 1;
    }
