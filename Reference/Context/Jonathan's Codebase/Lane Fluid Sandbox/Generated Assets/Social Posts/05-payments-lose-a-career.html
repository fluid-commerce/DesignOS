<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Fluid Payments — Lose a Career</title>
  <link rel="stylesheet" href="base.css">
  <style>
    /* Accent: BLUE only — Pull quote / manifesto */
    .quote-mark { font-family: var(--font-display); font-weight: 900; font-size: 180px; line-height: 0.5; color: var(--blue); opacity: 0.15; margin-bottom: -20px; position: relative; z-index: 4; }
    .quote-text { font-family: var(--font-display); font-weight: 900; font-size: 52px; line-height: 1.0; letter-spacing: -0.02em; color: var(--white); margin-bottom: 32px; max-width: 900px; position: relative; z-index: 4; }
    .quote-text .accent { color: var(--blue); }
    .attribution { font-family: var(--font-hand); font-size: 18px; font-weight: 700; color: var(--blue); opacity: 0.7; position: relative; z-index: 4; }
  </style>
</head>
<body>
  <div class="card card-ig">
    <!-- Brushstrokes: 02 compact upper-left + 06 wide bottom-center -->
    <img class="brush" src="../../Logos, textures/brushstroke02.png" alt="" style="top: -15px; left: -20px; width: 380px; opacity: 0.24;">
    <img class="brush" src="../../Logos, textures/brushstroke06.png" alt="" style="bottom: -20px; left: -40px; width: 700px; opacity: 0.12;">

    <div class="side-label">Insights</div>

    <div class="quote-mark">&ldquo;</div>

    <div class="quote-text">
      When a transaction fails in e-commerce, you lose a sale. When a transaction fails in direct selling, you might <span class="accent">lose a career</span>.
    </div>

    <div class="body-copy" style="margin-bottom: 28px; max-width: 640px;">
      That's groceries. That's her daughter's dance lessons. That's her belief that this business can work for her.
    </div>

    <div class="attribution">— Fluid We-Commerce Manifesto</div>

    <div class="footer footer-ig">
      <div class="footer-left">
        <img src="../../Logos, textures/We-Commerce Flags.png" alt="Fluid" style="height: 16px;">
        <span class="sep">|</span>
        <img src="../../Logos, textures/We-Commerce Logos.png" alt="We-Commerce" style="height: 14px;">
      </div>
      <div class="footer-right">
        <img src="../../Logos, textures/Frame 3.png" alt="fluid" style="height: 22px;">
      </div>
    </div>
  </div>
</body>
</html>
