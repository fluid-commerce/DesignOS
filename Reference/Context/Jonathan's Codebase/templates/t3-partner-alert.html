<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<style>
  @font-face {
    font-family: 'flfontbold';
    src: url('../fonts/flfontbold.ttf') format('truetype');
    font-weight: 700;
  }
  @font-face {
    font-family: 'NeueHaas';
    src: url('../fonts/Inter-VariableFont_opsz,wght.ttf') format('truetype');
    font-weight: 100 900;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body { min-height: 100vh; background: #111; }
  body { display: flex; justify-content: center; align-items: center; }

  .canvas {
    width: 1340px;
    height: 630px;
    overflow: hidden;
    background: #000;
    position: relative;
    flex-shrink: 0;
  }

  /* ── Background brush texture: left:-137 top:-626, rotated 90deg ── */
  .bg-texture {
    position: absolute;
    left: -137px;
    top: -626px;
    width: 1161px;
    height: 801px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .bg-texture-inner {
    flex-shrink: 0;
    transform: rotate(90deg);
    width: 801px;
    height: 1161px;
    position: relative;
    overflow: hidden;
  }
  .bg-texture-inner img {
    position: absolute;
    height: 103.56%;
    left: 0.69%;
    max-width: none;
    top: -0.03%;
    width: 100%;
  }

  /* ── Headline: centered, font-size:175.216px, lh:0.8 ── */
  .headline {
    position: absolute;
    left: calc(50% + 0.12px);
    top: 105px;
    transform: translateX(-50%);
    width: 1340.241px;
    font-family: 'NeueHaas', sans-serif;
    font-weight: 900;
    font-size: 175.216px;
    line-height: 0.8;
    color: #ffffff;
    text-align: center;
    white-space: normal;
  }

  /* ── Circle sketch (blue brush): left:544.73 top:76.77 ── */
  .circle-sketch {
    position: absolute;
    left: 544.73px;
    top: 76.77px;
    width: 366.886px;
    height: 790.253px;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: visible;
  }
  .circle-sketch-inner {
    flex-shrink: 0;
    transform: rotate(-59.01deg);
    width: 612.673px;
    height: 514.733px;
    position: relative;
  }
  .circle-sketch-inner img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    pointer-events: none;
  }

  /* ── Phone mockup: left:127 top:0 w:945 h:630 ── */
  .phone {
    position: absolute;
    left: 127px;
    top: 0;
    width: 945px;
    height: 630px;
    overflow: hidden;
  }
  .phone img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: contain;
    pointer-events: none;
  }

  /* ── WeCommerce logo: centered bottom ── */
  .wc-logo {
    position: absolute;
    left: 50%;
    top: 89.87%;
    transform: translateX(-50%);
    width: 130px;
  }
  .wc-logo img {
    display: block;
    position: relative;
    left: 3.36px;
    top: 0.88px;
    width: 122.943px;
    height: 31.309px;
  }

  /* ── Flag/Vector: bottom left ── */
  .flag {
    position: absolute;
    inset: 89.68% 94.17% 5.49% 3%;
  }
  .flag img {
    display: block;
    width: 100%;
    height: 100%;
  }

  /* ── Fluid logo: bottom right ── */
  .fluid-logo {
    position: absolute;
    left: calc(50% + 531.99px);
    top: 572px;
    transform: translateX(-50%);
    height: 22px;
    display: flex;
    align-items: center;
  }
  .fluid-logo img {
    height: 22px;
    width: auto;
    pointer-events: none;
  }

  /* ── Accent label: flfontbold 68px blue, rotated -28.61deg ── */
  .accent-label {
    position: absolute;
    left: calc(50% + 140px);
    top: 342px;
    width: 366.886px;
    height: 266.7px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .accent-label p {
    flex-shrink: 0;
    transform: rotate(-28.61deg);
    font-family: 'flfontbold', sans-serif;
    font-size: 68px;
    line-height: 0.8;
    color: #44b2ff;
    white-space: nowrap;
  }
</style>
</head>
<body>
<div class="canvas">

  <!-- Background brush texture -->
  <div class="bg-texture">
    <div class="bg-texture-inner">
      <img src="assets/brush-white.png" alt="">
    </div>
  </div>

  <!-- Headline (behind everything) -->
  <p class="headline">YOUR ONE STOP SHOP FOR REPS</p>

  <!-- Circle sketch (blue brush, right side) -->
  <div class="circle-sketch">
    <div class="circle-sketch-inner">
      <img src="assets/textures/circles/circle-sketch-blue.png" alt="">
    </div>
  </div>

  <!-- Phone mockup -->
  <div class="phone">
    <img src="assets/phone-mockup.png" alt="">
  </div>

  <!-- WeCommerce logo (bottom center) -->
  <div class="wc-logo">
    <img src="assets/wecommerce-logo.svg" alt="">
  </div>

  <!-- Flag icon (bottom left) -->
  <div class="flag">
    <img src="assets/flag-icon.svg" alt="">
  </div>

  <!-- Fluid logo (bottom right) -->
  <div class="fluid-logo">
    <img src="assets/fluid-logo.png" alt="fluid">
  </div>

  <!-- Accent label (top layer) -->
  <div class="accent-label">
    <p>App Feature<br>Highlight</p>
  </div>

</div><!-- /.canvas -->
<script src="nav.js"></script>
</body>
</html>
