<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Template Editor</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0a0a0a;
    color: #ccc;
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ── Header ── */
  .editor-header {
    height: 52px;
    background: #0a0a0a;
    border-bottom: 1px solid #1a1a1a;
    display: flex;
    align-items: center;
    padding: 0 20px;
    gap: 12px;
    flex-shrink: 0;
    z-index: 10;
  }
  .editor-back {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #333;
    text-decoration: none;
    transition: color 0.15s;
    white-space: nowrap;
  }
  .editor-back:hover { color: #888; }
  .editor-sep { color: #1e1e1e; font-size: 16px; line-height: 1; }
  .editor-title {
    font-size: 12px;
    font-weight: 600;
    color: #666;
    flex: 1;
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .editor-actions { display: flex; gap: 8px; flex-shrink: 0; }
  .btn-reset {
    padding: 6px 14px;
    border: 1px solid #1e1e1e;
    border-radius: 3px;
    background: transparent;
    color: #333;
    font-family: inherit;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.09em;
    text-transform: uppercase;
    cursor: pointer;
    transition: color 0.15s, border-color 0.15s;
  }
  .btn-reset:hover { color: #888; border-color: #333; }
  .btn-download {
    padding: 6px 16px;
    border: none;
    border-radius: 3px;
    background: #44B2FF;
    color: #000;
    font-family: inherit;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.09em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn-download:hover { background: #5cc0ff; }
  .btn-save {
    padding: 6px 14px;
    border: 1px solid #1a2a3a;
    border-radius: 3px;
    background: transparent;
    color: #44B2FF;
    font-family: inherit;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.09em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
  }
  .btn-save:hover { background: rgba(68,178,255,0.1); border-color: #44B2FF; }

  /* ── Download dropdown ── */
  .dl-dropdown { position: relative; }
  .dl-menu {
    position: absolute;
    right: 0;
    top: calc(100% + 6px);
    background: #0e0e0e;
    border: 1px solid #222;
    border-radius: 4px;
    min-width: 148px;
    z-index: 9999;
    display: none;
    overflow: hidden;
    box-shadow: 0 8px 24px rgba(0,0,0,0.6);
  }
  .dl-menu.open { display: block; }
  .dl-item {
    display: block;
    width: 100%;
    padding: 9px 14px;
    text-align: left;
    background: transparent;
    border: none;
    border-bottom: 1px solid #111;
    color: #555;
    font-family: inherit;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.09em;
    text-transform: uppercase;
    cursor: pointer;
    transition: color 0.12s, background 0.12s;
  }
  .dl-item:last-child { border-bottom: none; }
  .dl-item:hover { color: #ccc; background: #111; }

  /* ── Fit / Fill toggle ── */
  .fit-fill-row {
    display: flex;
    margin-top: 6px;
    border-radius: 3px;
    overflow: hidden;
    border: 1px solid #1a1a1a;
  }
  .fit-fill-btn {
    flex: 1;
    padding: 5px 0;
    border: none;
    background: transparent;
    color: #2a2a2a;
    font-family: inherit;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    transition: color 0.12s, background 0.12s;
  }
  .fit-fill-btn + .fit-fill-btn { border-left: 1px solid #1a1a1a; }
  .fit-fill-btn.active { background: #111; color: #44B2FF; }
  .fit-fill-btn:not(.active):hover { color: #666; }

  /* ── Focus point dot (shown on image thumbnail in Fill mode) ── */
  .focus-dot {
    position: absolute;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    border: 2px solid #44B2FF;
    background: rgba(68,178,255,0.2);
    transform: translate(-50%, -50%);
    pointer-events: none;
    box-shadow: 0 0 0 1px rgba(0,0,0,0.6);
  }
  .focus-dot::after {
    content: '';
    position: absolute;
    left: 50%; top: 50%;
    width: 4px; height: 4px;
    border-radius: 50%;
    background: #44B2FF;
    transform: translate(-50%, -50%);
  }

  /* ── Save modal ── */
  .save-modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.72);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 99999;
  }
  .save-modal {
    background: #0e0e0e;
    border: 1px solid #1e1e1e;
    border-radius: 6px;
    padding: 24px 24px 20px;
    width: 340px;
    max-width: calc(100vw - 40px);
  }
  .save-modal-title {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: #444;
    margin-bottom: 16px;
  }
  .save-modal-actions {
    display: flex;
    justify-content: flex-end;
    gap: 8px;
    margin-top: 16px;
  }
  .btn-save-confirm {
    padding: 6px 16px;
    border: none;
    border-radius: 3px;
    background: #44B2FF;
    color: #000;
    font-family: inherit;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.09em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn-save-confirm:hover { background: #5cc0ff; }

  /* ── Layout ── */
  .editor-layout {
    flex: 1;
    display: flex;
    overflow: hidden;
  }

  /* ── Preview panel ── */
  .editor-preview {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #111;
    position: relative;
    overflow: hidden;
  }
  .iframe-wrap {
    position: relative;
    flex-shrink: 0;
    /* size set by JS */
  }
  .iframe-wrap iframe {
    display: block;
    border: none;
    /* width/height/transform set by JS */
  }

  /* Brush drag cursor hint */
  .brush-drag-hint {
    position: absolute;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #222;
    white-space: nowrap;
    pointer-events: none;
    display: none;
  }
  .brush-drag-hint.visible { display: block; }

  /* ── Sidebar ── */
  .editor-sidebar {
    width: 300px;
    flex-shrink: 0;
    border-left: 1px solid #1a1a1a;
    background: #0a0a0a;
    overflow-y: auto;
    padding-bottom: 48px;
  }
  .editor-sidebar::-webkit-scrollbar { width: 3px; }
  .editor-sidebar::-webkit-scrollbar-track { background: transparent; }
  .editor-sidebar::-webkit-scrollbar-thumb { background: #1e1e1e; border-radius: 2px; }

  /* ── Sidebar sections ── */
  .sidebar-section {
    padding: 18px 18px 4px 18px;
  }
  .sidebar-section + .sidebar-section {
    border-top: 1px solid #111;
    margin-top: 4px;
  }
  .sidebar-section-label {
    font-size: 8px;
    font-weight: 700;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #2a2a2a;
    margin-bottom: 14px;
  }

  /* ── Form elements ── */
  .form-group { margin-bottom: 14px; }
  .form-label {
    display: block;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #3a3a3a;
    margin-bottom: 5px;
  }
  .form-sublabel {
    font-size: 10px;
    color: #252525;
    margin-bottom: 6px;
    line-height: 1.4;
  }
  .form-input, .form-textarea {
    width: 100%;
    padding: 7px 10px;
    border: 1px solid #1a1a1a;
    border-radius: 3px;
    background: #050505;
    color: #bbb;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 12px;
    line-height: 1.5;
    resize: vertical;
    transition: border-color 0.15s;
  }
  .form-input:focus, .form-textarea:focus {
    outline: none;
    border-color: #44B2FF;
  }
  .form-textarea { min-height: 52px; }

  /* Position row */
  .pos-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .pos-row .form-group { margin-bottom: 0; }

  /* ── Image field ── */
  .image-field { margin-bottom: 14px; }
  .image-thumb {
    width: 100%;
    height: 72px;
    background: #050505;
    border: 1px solid #1a1a1a;
    border-radius: 3px;
    overflow: hidden;
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .image-thumb img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
  }
  .image-thumb-empty {
    font-size: 10px;
    color: #1e1e1e;
  }
  .btn-upload-label {
    display: block;
    width: 100%;
    padding: 7px 12px;
    border: 1px dashed #1a1a1a;
    border-radius: 3px;
    background: transparent;
    color: #333;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.15s, color 0.15s;
  }
  .btn-upload-label:hover { border-color: #333; color: #888; }
  .btn-upload-label input { display: none; }

  /* ── Texture dropdown (brush section) ── */
  .texture-dropdown-wrap {
    position: relative;
    margin-bottom: 14px;
  }
  .texture-dropdown-trigger {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 10px;
    border: 1px solid #1a1a1a;
    border-radius: 3px;
    background: #050505;
    color: #888;
    font-size: 11px;
    font-family: inherit;
    cursor: pointer;
    transition: border-color 0.15s;
  }
  .texture-dropdown-trigger:hover {
    border-color: #2a2a2a;
  }
  .texture-dropdown-selected {
    flex: 1;
    text-align: left;
  }
  .texture-dropdown-chevron {
    width: 0;
    height: 0;
    margin-left: 8px;
    border-left: 4px solid transparent;
    border-right: 4px solid transparent;
    border-top: 5px solid #555;
  }
  .texture-dropdown-panel {
    position: absolute;
    left: 0;
    right: 0;
    top: 100%;
    margin-top: 4px;
    padding: 12px;
    background: #0a0a0a;
    border: 1px solid #1a1a1a;
    border-radius: 4px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.5);
    z-index: 100;
    max-height: 340px;
    overflow-y: auto;
  }
  .texture-dropdown-panel[hidden] {
    display: none;
  }
  .texture-dropdown-header {
    font-size: 8px;
    font-weight: 700;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #666;
    margin-bottom: 12px;
  }
  .texture-category {
    margin-bottom: 14px;
  }
  .texture-category:last-child { margin-bottom: 0; }
  .texture-category-title {
    font-size: 8px;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: #555;
    margin-bottom: 6px;
  }
  .texture-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 6px;
  }
  .texture-grid-dropdown {
    grid-template-columns: repeat(3, 1fr);
    gap: 6px;
  }
  .texture-thumb {
    aspect-ratio: 1;
    padding: 0;
    border: 2px solid #1a1a1a;
    border-radius: 3px;
    background: #111;
    cursor: pointer;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .texture-thumb:hover {
    border-color: #333;
  }
  .texture-thumb.selected {
    border-color: #44B2FF;
    box-shadow: 0 0 0 1px #44B2FF;
  }
  .texture-thumb img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    pointer-events: none;
  }

  /* ── Brush section ── */
  .brush-hint {
    font-size: 10px;
    color: #252525;
    line-height: 1.6;
    margin-bottom: 12px;
  }
  .brush-chip {
    display: inline-block;
    padding: 2px 7px;
    background: #0c1a28;
    border-radius: 2px;
    color: #44B2FF;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.07em;
  }

  /* ── Toast ── */
  .toast {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%) translateY(14px);
    padding: 8px 18px;
    border-radius: 3px;
    background: #44B2FF;
    color: #000;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.05em;
    z-index: 9999;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s, transform 0.2s;
    white-space: nowrap;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
</style>
</head>
<body>

<div class="editor-header">
  <a href="./" class="editor-back">← Library</a>
  <span class="editor-sep">/</span>
  <span class="editor-title" id="editorTitle">Loading…</span>
  <div class="editor-actions">
    <button class="btn-reset" id="btnReset">Reset</button>
    <button class="btn-save" id="btnSave">✦ Save</button>
    <div class="dl-dropdown" id="dlDropdown">
      <button class="btn-download" id="btnDownload">↓ Download ▾</button>
      <div class="dl-menu" id="dlMenu">
        <button class="dl-item" id="dlCode">⟨/⟩ &nbsp;Code</button>
        <button class="dl-item" id="dlJpg">↓ &nbsp;JPG</button>
        <button class="dl-item" id="dlWebp">↓ &nbsp;WebP</button>
      </div>
    </div>
  </div>
</div>

<div class="editor-layout">
  <div class="editor-preview" id="editorPreview">
    <div class="iframe-wrap" id="iframeWrap">
      <iframe id="templateFrame" scrolling="no"></iframe>
    </div>
    <div class="brush-drag-hint" id="brushDragHint">Drag the circle brush to reposition</div>
  </div>
  <div class="editor-sidebar" id="editorSidebar">
    <!-- populated by editor.js -->
  </div>
</div>

<!-- Save to My Creations modal -->
<div class="save-modal-overlay" id="saveModalOverlay" style="display:none">
  <div class="save-modal">
    <div class="save-modal-title" id="saveModalTitle">Save to My Creations</div>
    <div class="form-group" style="margin-bottom:0">
      <label class="form-label">Name</label>
      <input class="form-input" id="saveNameInput" type="text" placeholder="My design…">
    </div>
    <div class="save-modal-actions">
      <button class="btn-reset" onclick="closeSaveModal()">Cancel</button>
      <button class="btn-save-confirm" id="saveConfirmBtn" onclick="confirmSave()">✦ Save</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<script src="editor.js"></script>
</body>
</html>
