<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Fluid Payments — 6x Retry (B)</title>
  <link rel="stylesheet" href="base.css">
  <style>
    /* Accent: PURPLE — Giant stat hero */
    .giant-stat {
      font-family: var(--font-display);
      font-weight: 900;
      font-size: 280px;
      line-height: 0.8;
      letter-spacing: -0.05em;
      color: var(--purple);
      position: relative;
      z-index: 4;
      margin-bottom: 24px;
    }
  </style>
</head>
<body>
  <div class="card card-ig">
    <!-- Brushstrokes: 06 wide bottom + 07 diagonal top-right -->
    <img class="brush" src="../../Logos, textures/brushstroke06.png" alt="" style="bottom: -20px; left: -50px; width: 750px; opacity: 0.13;">
    <img class="brush" src="../../Logos, textures/brushstroke07.png" alt="" style="top: -25px; right: -55px; width: 440px; opacity: 0.2;">

    <div class="side-label">Fluid Payments</div>
    <div class="slide-num">03/05</div>

    <div class="sub-text sub-text-md text-purple" style="margin-bottom: 16px;">Cascading Payment Intelligence</div>

    <div class="giant-stat">6x</div>

    <div class="headline headline-lg" style="max-width: 800px;">
      Because one<br>
      "no" shouldn't<br>
      mean <span class="text-purple">no.</span>
    </div>

    <div class="body-copy" style="margin-top: 20px; max-width: 600px;">
      Six processors. Six chances. Your customer never knows — the sale just goes through.
    </div>

    <div class="footer footer-ig">
      <div class="footer-left">
        <img src="../../Logos, textures/We-Commerce Flags.png" alt="Fluid" style="height: 16px;">
        <span class="sep">|</span>
        <img src="../../Logos, textures/We-Commerce Logos.png" alt="We-Commerce" style="height: 14px;">
      </div>
      <div class="footer-right">
        <img src="../../Logos, textures/Frame 3.png" alt="fluid" style="height: 22px;">
      </div>
    </div>
  </div>
</body>
</html>
