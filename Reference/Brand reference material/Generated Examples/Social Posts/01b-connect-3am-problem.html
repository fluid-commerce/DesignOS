<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Fluid Connect — 3am Problem (Variation B)</title>
  <link rel="stylesheet" href="base.css">
  <style>
    /* Accent: PURPLE only — Giant stat hero layout */
    .stat-zero {
      font-family: var(--font-display);
      font-weight: 900;
      font-size: 280px;
      line-height: 0.8;
      letter-spacing: -0.05em;
      color: var(--purple);
      margin-bottom: 4px;
    }
    .stat-label {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 16px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: rgba(255,255,255,0.3);
      margin-bottom: 40px;
    }
  </style>
</head>
<body>
  <div class="card card-ig">
    <!-- Brushstrokes: 05 wide top + 03 tall right edge -->
    <img class="brush" src="../../Logos, textures/brushstroke05.png" alt="" style="top: -15px; left: -40px; width: 900px; opacity: 0.18;">
    <img class="brush" src="../../Logos, textures/brushstroke03.png" alt="" style="top: -20px; right: -35px; height: 110%; width: auto; opacity: 0.2;">

    <div class="side-label">Fluid Connect</div>
    <div class="slide-num">01/05</div>

    <!-- Purple circle sketch wrapping "$0" -->
    <img class="circle-sketch circle-sketch-purple" src="../../Logos, textures/circle sketch 1.png" alt="" style="top: 195px; left: 55px; width: 340px; transform: rotate(-6deg); opacity: 0.6;">

    <div class="sub-text sub-text-md text-purple" style="margin-bottom: 24px;">The invisible loss</div>

    <div class="stat-zero">$0</div>
    <div class="stat-label">Commissions lost to sync errors look like this on your dashboard</div>

    <div class="headline headline-lg" style="margin-bottom: 24px;">
      They don't show<br>
      up as errors.<br>
      They show up as<br>
      <span class="text-purple">distrust.</span>
    </div>

    <div class="body-copy">
      When a commission disappears, your reps don't file a ticket. They stop sharing deals. <strong>Fluid Connect makes sure nothing disappears.</strong>
    </div>

    <div class="footer footer-ig">
      <div class="footer-left">
        <img src="../../Logos, textures/We-Commerce Flags.png" alt="Fluid" style="height: 16px;">
        <span class="sep">|</span>
        <img src="../../Logos, textures/We-Commerce Logos.png" alt="We-Commerce" style="height: 14px;">
      </div>
      <div class="footer-right">
        <img src="../../Logos, textures/Frame 3.png" alt="fluid" style="height: 22px;">
      </div>
    </div>
  </div>
</body>
</html>
