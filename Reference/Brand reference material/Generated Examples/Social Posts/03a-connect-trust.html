<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Fluid Connect — Trust (Variation A)</title>
  <link rel="stylesheet" href="base.css">
  <style>
    /* Accent: BLUE only — Pull quote layout */
    .quote-mark {
      font-family: Georgia, serif;
      font-size: 240px;
      line-height: 0.6;
      color: var(--blue);
      opacity: 0.35;
      margin-bottom: -20px;
    }
    .quote-text {
      font-family: var(--font-display);
      font-weight: 900;
      font-size: 72px;
      line-height: 0.95;
      letter-spacing: -0.03em;
      color: var(--white);
      text-transform: uppercase;
      margin-bottom: 20px;
    }
    .quote-attr {
      font-family: var(--font-display);
      font-weight: 500;
      font-size: 16px;
      color: rgba(255,255,255,0.3);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 40px;
    }
    .quote-rule {
      width: 40px;
      height: 2px;
      background: var(--blue);
      opacity: 0.5;
      margin-bottom: 28px;
    }
  </style>
</head>
<body>
  <div class="card card-ig">
    <!-- Brushstrokes: 02 upper-left + 05 wide bottom -->
    <img class="brush" src="../../Logos, textures/brushstroke02.png" alt="" style="top: -15px; left: -30px; width: 400px; opacity: 0.18;">
    <img class="brush" src="../../Logos, textures/brushstroke05.png" alt="" style="bottom: -15px; left: -30px; width: 850px; opacity: 0.14;">

    <div class="side-label">Fluid Connect</div>
    <div class="slide-num">03/05</div>

    <div class="quote-mark">&ldquo;</div>

    <div class="quote-text">
      Did I get<br>
      <span class="text-blue">credit</span> for<br>
      that sale?
    </div>

    <div class="quote-attr">&mdash; Every rep, every quarter, at every company with sync issues</div>

    <div class="quote-rule"></div>

    <div class="body-copy" style="margin-bottom: 36px;">
      That question costs more than the sync error itself. It costs <strong>trust, pipeline, and eventually the rep</strong>. Fluid Connect makes the answer automatic.
    </div>

    <div class="sub-text sub-text-lg text-blue">Real-time sync. Real trust.</div>

    <div class="footer footer-ig">
      <div class="footer-left">
        <img src="../../Logos, textures/We-Commerce Flags.png" alt="Fluid" style="height: 16px;">
        <span class="sep">|</span>
        <img src="../../Logos, textures/We-Commerce Logos.png" alt="We-Commerce" style="height: 14px;">
      </div>
      <div class="footer-right">
        <img src="../../Logos, textures/Frame 3.png" alt="fluid" style="height: 22px;">
      </div>
    </div>
  </div>
</body>
</html>
