<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Fluid Connect — Frankenstein (Variation B)</title>
  <link rel="stylesheet" href="base.css">
  <style>
    /* Accent: GREEN only — Giant stat "15" hero */
    .stat-fifteen {
      font-family: var(--font-display);
      font-weight: 900;
      font-size: 340px;
      line-height: 0.75;
      letter-spacing: -0.06em;
      color: var(--green);
      opacity: 0.9;
      margin-bottom: 8px;
    }
    .stat-caption {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 15px;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: rgba(255,255,255,0.25);
      margin-bottom: 44px;
    }
  </style>
</head>
<body>
  <div class="card card-ig">
    <!-- Brushstrokes: 03 tall left edge + 01 compact bottom-right -->
    <img class="brush" src="../../Logos, textures/brushstroke03.png" alt="" style="top: -20px; left: -40px; height: 110%; width: auto; opacity: 0.2;">
    <img class="brush" src="../../Logos, textures/brushstroke01.png" alt="" style="bottom: -10px; right: -20px; width: 360px; opacity: 0.14;">

    <div class="side-label">Fluid Connect</div>
    <div class="slide-num">02/05</div>

    <!-- Green circle sketch wrapping "15" -->
    <img class="circle-sketch circle-sketch-green" src="../../Logos, textures/circle sketch 1.png" alt="" style="top: 150px; left: 40px; width: 380px; transform: rotate(-8deg); opacity: 0.55;">

    <div class="stat-fifteen">15</div>
    <div class="stat-caption">Vendors stitched together with hope and duct tape</div>

    <div class="headline headline-lg" style="margin-bottom: 24px;">
      You built a<br>
      Frankenstein.<br>
      <span class="text-green">We built the cure.</span>
    </div>

    <div class="body-copy">
      15 contracts. 15 points of failure. 15 vendors who blame each other when something breaks. <strong>Fluid Connect is one platform, one contract, one throat to choke.</strong>
    </div>

    <div class="footer footer-ig">
      <div class="footer-left">
        <img src="../../Logos, textures/We-Commerce Flags.png" alt="Fluid" style="height: 16px;">
        <span class="sep">|</span>
        <img src="../../Logos, textures/We-Commerce Logos.png" alt="We-Commerce" style="height: 14px;">
      </div>
      <div class="footer-right">
        <img src="../../Logos, textures/Frame 3.png" alt="fluid" style="height: 22px;">
      </div>
    </div>
  </div>
</body>
</html>
