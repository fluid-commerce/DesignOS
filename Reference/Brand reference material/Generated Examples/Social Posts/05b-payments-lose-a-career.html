<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Fluid Payments — Lose a Career (B)</title>
  <link rel="stylesheet" href="base.css">
  <style>
    /* Accent: GREEN — Headline + contrast dark card */
    .contrast-card {
      padding: 32px 36px;
      margin-top: 40px;
    }
    .contrast-row {
      display: flex;
      align-items: baseline;
      gap: 16px;
      padding: 18px 0;
    }
    .contrast-row + .contrast-row {
      border-top: 1px solid rgba(255,255,255,0.06);
    }
    .contrast-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: rgba(255,255,255,0.3);
      min-width: 140px;
    }
    .contrast-value {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 20px;
      letter-spacing: -0.01em;
      color: rgba(255,255,255,0.5);
    }
    .contrast-value.highlight {
      color: var(--green);
      font-weight: 900;
    }
    .arrow {
      color: rgba(255,255,255,0.15);
      font-size: 18px;
      margin: 0 4px;
    }
  </style>
</head>
<body>
  <div class="card card-ig">
    <!-- Brushstrokes: 05 wide top + 04 tall right edge -->
    <img class="brush" src="../../Logos, textures/brushstroke05.png" alt="" style="top: -20px; left: -60px; width: 700px; opacity: 0.15;">
    <img class="brush" src="../../Logos, textures/brushstroke04.png" alt="" style="top: -10px; right: -25px; height: 100%; width: auto; opacity: 0.12;">

    <div class="side-label">Insights</div>

    <div class="sub-text sub-text-md text-green" style="margin-bottom: 20px;">The difference matters</div>

    <div class="headline headline-ig" style="margin-bottom: 0;">
      This isn't<br>
      <span class="text-green">e-commerce.</span>
    </div>

    <div class="contrast-card dark-card">
      <div class="contrast-row">
        <div class="contrast-label">E-commerce</div>
        <div class="contrast-value">Lost sale <span class="arrow">&rarr;</span> retry later</div>
      </div>
      <div class="contrast-row">
        <div class="contrast-label">Direct selling</div>
        <div class="contrast-value highlight">Lost career <span class="arrow">&rarr;</span> gone forever</div>
      </div>
    </div>

    <div class="body-copy" style="margin-top: 32px; max-width: 640px;">
      That's groceries. That's her daughter's dance lessons. That's her belief that this business can work for her.
    </div>

    <div class="footer footer-ig">
      <div class="footer-left">
        <img src="../../Logos, textures/We-Commerce Flags.png" alt="Fluid" style="height: 16px;">
        <span class="sep">|</span>
        <img src="../../Logos, textures/We-Commerce Logos.png" alt="We-Commerce" style="height: 14px;">
      </div>
      <div class="footer-right">
        <img src="../../Logos, textures/Frame 3.png" alt="fluid" style="height: 22px;">
      </div>
    </div>
  </div>
</body>
</html>
