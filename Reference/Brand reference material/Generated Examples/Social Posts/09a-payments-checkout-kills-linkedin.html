<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Fluid Payments — 15-Click Checkout — LinkedIn (Variation A)</title>
  <link rel="stylesheet" href="base.css">
  <style>
    /* Accent: BLUE only — LinkedIn landscape, full-bleed headline, no card */
    .card-li {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: flex-start;
    }
  </style>
</head>
<body>
  <div class="card card-li">
    <!-- Brushstrokes: 04 tall left edge + 02 compact top-right -->
    <img class="brush" src="../../Logos, textures/brushstroke04.png" alt="" style="top: -30px; left: -40px; height: 115%; width: auto; opacity: 0.18;">
    <img class="brush" src="../../Logos, textures/brushstroke02.png" alt="" style="top: -15px; right: -25px; width: 340px; opacity: 0.15;">

    <div class="side-label">Fluid Payments</div>

    <div class="sub-text sub-text-md text-blue" style="margin-bottom: 24px;">The checkout problem</div>

    <div class="headline" style="font-size: 72px; line-height: 0.9; letter-spacing: -0.035em; margin-bottom: 28px;">
      Someone's<br>
      ready to buy.<br>
      Your checkout<br>
      wants <span class="headline-accent text-blue" style="font-size: 72px;">15 clicks.</span>
    </div>

    <div class="body-copy" style="font-size: 20px; max-width: 640px;">
      They're at a red light. The moment passes. You'll never know that sale almost happened. <strong>So we made checkout one tap.</strong>
    </div>

    <div class="footer footer-li">
      <div class="footer-left">
        <img src="../../Logos, textures/We-Commerce Flags.png" alt="Fluid" style="height: 16px;">
        <span class="sep">|</span>
        <img src="../../Logos, textures/We-Commerce Logos.png" alt="We-Commerce" style="height: 14px;">
      </div>
      <div class="footer-right">
        <img src="../../Logos, textures/Frame 3.png" alt="fluid" style="height: 22px;">
      </div>
    </div>
  </div>
</body>
</html>
