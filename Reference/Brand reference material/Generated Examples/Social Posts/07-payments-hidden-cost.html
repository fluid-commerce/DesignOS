<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Fluid Payments — Hidden Cost</title>
  <link rel="stylesheet" href="base.css">
  <style>
    /* Accent: PURPLE only — Data / math layout */
    .cost-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 36px; }
    .cost-card { padding: 24px; }
    .cost-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: rgba(255,255,255,0.3); margin-bottom: 8px; }
    .cost-value { font-family: var(--font-display); font-weight: 900; font-size: 40px; letter-spacing: -0.03em; line-height: 1; }
    .big-cost { padding: 28px; text-align: center; margin-bottom: 36px; border: 1.5px solid rgba(201,133,229,0.3); }
    .big-cost-label { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--purple); opacity: 0.6; margin-bottom: 10px; }
    .big-cost-value { font-family: var(--font-display); font-weight: 900; font-size: 60px; letter-spacing: -0.03em; color: var(--purple); line-height: 1; }
    .big-cost-sub { font-size: 14px; font-weight: 300; color: rgba(255,255,255,0.3); margin-top: 8px; }
  </style>
</head>
<body>
  <div class="card card-ig">
    <!-- Brushstrokes: 03 right edge full-height + 06 bottom-left accent -->
    <img class="brush" src="../../Logos, textures/brushstroke03.png" alt="" style="top: 0; right: -20px; height: 100%; width: auto; opacity: 0.18;">
    <img class="brush" src="../../Logos, textures/brushstroke01.png" alt="" style="bottom: -10px; left: -30px; width: 380px; opacity: 0.1; transform: rotate(5deg);">

    <div class="side-label">Fluid Payments</div>
    <div class="slide-num">02/05</div>

    <!-- Purple circle sketch highlighting "$360-600K" -->
    <img class="circle-sketch circle-sketch-purple" src="../../Logos, textures/circle sketch 1.png" alt="" style="bottom: 140px; left: 50%; transform: translateX(-50%) rotate(5deg); width: 380px; opacity: 0.4;">

    <div class="sub-text sub-text-md text-purple" style="margin-bottom: 20px;">The math your CFO hasn't seen</div>

    <div class="headline headline-lg" style="margin-bottom: 36px;">
      A 3-4%<br>
      decline rate<br>
      sounds fine.<br>
      Yours is 6-8%.
    </div>

    <div class="cost-grid">
      <div class="cost-card dark-card">
        <div class="cost-label">Monthly Volume</div>
        <div class="cost-value text-gray">$1M</div>
      </div>
      <div class="cost-card dark-card">
        <div class="cost-label">Extra Monthly Losses</div>
        <div class="cost-value text-purple">$30–50K</div>
      </div>
    </div>

    <div class="big-cost dark-card">
      <div class="big-cost-label">Annual Preventable Losses</div>
      <div class="big-cost-value">$360–600K</div>
      <div class="big-cost-sub">Because your industry is flagged as "higher risk"</div>
    </div>

    <div class="footer footer-ig">
      <div class="footer-left">
        <img src="../../Logos, textures/We-Commerce Flags.png" alt="Fluid" style="height: 16px;">
        <span class="sep">|</span>
        <img src="../../Logos, textures/We-Commerce Logos.png" alt="We-Commerce" style="height: 14px;">
      </div>
      <div class="footer-right">
        <img src="../../Logos, textures/Frame 3.png" alt="fluid" style="height: 22px;">
      </div>
    </div>
  </div>
</body>
</html>
