<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Fluid Connect — 3am Problem (Variation A)</title>
  <link rel="stylesheet" href="base.css">
  <style>
    /* Accent: BLUE only — Centered manifesto layout */
    .manifesto-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      justify-content: center;
      flex: 1;
    }
    .manifesto-rule {
      width: 60px;
      height: 2px;
      background: var(--blue);
      opacity: 0.5;
      margin: 32px auto;
    }
  </style>
</head>
<body>
  <div class="card card-ig">
    <!-- Brushstrokes: 04 tall left edge + 02 compact top-right -->
    <img class="brush" src="../../Logos, textures/brushstroke04.png" alt="" style="top: -30px; left: -50px; height: 110%; width: auto; opacity: 0.18;">
    <img class="brush" src="../../Logos, textures/brushstroke02.png" alt="" style="top: -15px; right: -25px; width: 380px; opacity: 0.14;">

    <div class="side-label">Fluid Connect</div>
    <div class="slide-num">01/05</div>

    <div class="manifesto-wrap">
      <div class="sub-text sub-text-md text-blue" style="margin-bottom: 36px;">Fluid Connect</div>

      <div class="headline headline-ig" style="text-align: center; margin-bottom: 0;">
        Your commission<br>
        engine has a<br>
        <span class="text-blue">trust</span><br>
        problem.
      </div>

      <div class="manifesto-rule"></div>

      <div class="body-copy" style="text-align: center; max-width: 640px;">
        Orders go through. Records don't follow. Reps stop believing the system works — and start building their own spreadsheets. <strong>That's not a sync error. That's a fracture.</strong>
      </div>

      <div style="margin-top: 36px;">
        <div class="sub-text sub-text-lg text-blue">One connection. Zero 3am calls.</div>
      </div>
    </div>

    <div class="footer footer-ig">
      <div class="footer-left">
        <img src="../../Logos, textures/We-Commerce Flags.png" alt="Fluid" style="height: 16px;">
        <span class="sep">|</span>
        <img src="../../Logos, textures/We-Commerce Logos.png" alt="We-Commerce" style="height: 14px;">
      </div>
      <div class="footer-right">
        <img src="../../Logos, textures/Frame 3.png" alt="fluid" style="height: 22px;">
      </div>
    </div>
  </div>
</body>
</html>
