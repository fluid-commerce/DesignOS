<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Fluid Payments — 94%+ (Variation A)</title>
  <link rel="stylesheet" href="base.css">
  <style>
    /* Accent: PURPLE only — Headline + dark card stat row */
    .card-ig { justify-content: center; }
    .stat-row {
      display: flex;
      align-items: center;
      gap: 24px;
      padding: 28px 32px;
    }
    .stat-number {
      font-family: var(--font-display);
      font-weight: 900;
      font-size: 72px;
      line-height: 1;
      letter-spacing: -0.04em;
      color: var(--purple);
    }
    .stat-detail {
      font-size: 14px;
      font-weight: 300;
      line-height: 1.5;
      color: rgba(255,255,255,0.4);
      max-width: 260px;
    }
    .stat-detail strong { color: var(--white); font-weight: 700; }
    .stat-divider {
      width: 1px;
      height: 48px;
      background: rgba(255,255,255,0.08);
    }
    .stat-item {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .stat-item-label {
      font-family: var(--font-hand);
      font-size: 12px;
      font-weight: 700;
      color: var(--purple);
      text-transform: uppercase;
    }
    .stat-item-value {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 15px;
      color: rgba(255,255,255,0.6);
    }
  </style>
</head>
<body>
  <div class="card card-ig">
    <!-- Brushstrokes: 07 diagonal top-right + 01 compact bottom-left -->
    <img class="brush" src="../../Logos, textures/brushstroke07.png" alt="" style="top: -20px; right: -40px; width: 600px; opacity: 0.2; transform: rotate(-5deg);">
    <img class="brush" src="../../Logos, textures/brushstroke01.png" alt="" style="bottom: -15px; left: -30px; width: 380px; opacity: 0.16;">

    <div class="side-label">Fluid Payments</div>
    <div class="slide-num">04/05</div>

    <!-- Purple circle sketch wrapping "Relentless" -->
    <img class="circle-sketch circle-sketch-purple" src="../../Logos, textures/circle sketch 1.png" alt="" style="top: 395px; left: 18px; width: 380px; transform: rotate(-4deg); opacity: 0.55;">

    <div class="sub-text sub-text-md text-purple" style="margin-bottom: 32px;">Fluid Payments</div>

    <div class="headline headline-ig" style="margin-bottom: 40px;">
      Invisible when<br>
      it works.<br>
      Relentless<br>
      when it doesn't.
    </div>

    <div class="dark-card" style="margin-top: 8px;">
      <div class="stat-row">
        <div class="stat-number">94%+</div>
        <div class="stat-divider"></div>
        <div class="stat-item">
          <div class="stat-item-label">Routing</div>
          <div class="stat-item-value">Intelligent cascade recovery</div>
        </div>
        <div class="stat-divider"></div>
        <div class="stat-item">
          <div class="stat-item-label">Retry</div>
          <div class="stat-item-value">Payday-aligned subscriptions</div>
        </div>
      </div>
    </div>

    <div class="body-copy" style="margin-top: 24px; font-size: 18px;">
      <strong>Every transaction gets its best shot.</strong> Acceptance rate across the network.
    </div>

    <div class="footer footer-ig">
      <div class="footer-left">
        <img src="../../Logos, textures/We-Commerce Flags.png" alt="Fluid" style="height: 16px;">
        <span class="sep">|</span>
        <img src="../../Logos, textures/We-Commerce Logos.png" alt="We-Commerce" style="height: 14px;">
      </div>
      <div class="footer-right">
        <img src="../../Logos, textures/Frame 3.png" alt="fluid" style="height: 22px;">
      </div>
    </div>
  </div>
</body>
</html>
