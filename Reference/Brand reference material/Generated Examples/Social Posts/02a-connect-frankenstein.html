<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Fluid Connect — Frankenstein (Variation A)</title>
  <link rel="stylesheet" href="base.css">
</head>
<body>
  <div class="card card-ig">
    <!-- Brushstrokes: 07 diagonal sweep top-right + 06 wide bottom-left -->
    <img class="brush" src="../../Logos, textures/brushstroke07.png" alt="" style="top: -25px; right: -70px; width: 560px; opacity: 0.24;">
    <img class="brush" src="../../Logos, textures/brushstroke06.png" alt="" style="bottom: -20px; left: -50px; width: 650px; opacity: 0.16;">

    <div class="side-label">Fluid Connect</div>
    <div class="slide-num">02/05</div>

    <!-- Orange circle sketch on "break" -->
    <img class="circle-sketch circle-sketch-orange" src="../../Logos, textures/circle sketch 1.png" alt="" style="bottom: 380px; right: 50px; width: 300px; transform: rotate(6deg); opacity: 0.65;">

    <div class="headline headline-mega" style="margin-bottom: 36px;">
      15 vendors.<br>
      15 contracts.<br>
      15 things<br>
      that <span class="text-orange">break.</span>
    </div>

    <div style="width: 50px; height: 3px; background: var(--orange); opacity: 0.6; margin-bottom: 32px;"></div>

    <div class="body-copy" style="margin-bottom: 40px;">
      Every integration you duct-taped together is another thing that <strong>fails at 3am</strong>. Fluid Connect replaces the entire stack.
    </div>

    <div class="sub-text sub-text-lg text-orange">One platform. Not fifteen.</div>

    <div class="footer footer-ig">
      <div class="footer-left">
        <img src="../../Logos, textures/We-Commerce Flags.png" alt="Fluid" style="height: 16px;">
        <span class="sep">|</span>
        <img src="../../Logos, textures/We-Commerce Logos.png" alt="We-Commerce" style="height: 14px;">
      </div>
      <div class="footer-right">
        <img src="../../Logos, textures/Frame 3.png" alt="fluid" style="height: 22px;">
      </div>
    </div>
  </div>
</body>
</html>
