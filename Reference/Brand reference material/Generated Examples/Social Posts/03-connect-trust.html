<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Fluid Connect — Trust</title>
  <link rel="stylesheet" href="base.css">
</head>
<body>
  <div class="card card-ig">
    <!-- Brushstrokes: 05 wide horizontal top + 02 compact upper-right accent -->
    <img class="brush" src="../../Logos, textures/brushstroke05.png" alt="" style="top: -10px; left: 50%; transform: translateX(-50%); width: 800px; opacity: 0.2;">
    <img class="brush" src="../../Logos, textures/brushstroke02.png" alt="" style="bottom: -15px; right: -30px; width: 350px; opacity: 0.15; transform: rotate(180deg);">

    <div class="side-label">Fluid Connect</div>
    <div class="slide-num">03/05</div>

    <!-- Green-tinted circle sketch around "credit" -->
    <img class="circle-sketch circle-sketch-green" src="../../Logos, textures/circle sketch 1.png" alt="" style="top: 190px; left: 250px; width: 300px; transform: rotate(-5deg); opacity: 0.7;">

    <div class="headline headline-ig">
      Did I get<br>
      credit for<br>
      that sale?
    </div>
    <div class="headline-accent text-green" style="font-size: 82px; margin-bottom: 40px;">
      Yes. Always.
    </div>

    <div class="body-copy" style="margin-bottom: 40px;">
      When sync fails — even once — reps stop sharing. They build their own spreadsheets. <strong>Fluid Connect exists so that question never comes up.</strong>
    </div>

    <div class="sub-text sub-text-lg text-green">When reps trust the system, they sell.</div>

    <div class="footer footer-ig">
      <div class="footer-left">
        <img src="../../Logos, textures/We-Commerce Flags.png" alt="Fluid" style="height: 16px;">
        <span class="sep">|</span>
        <img src="../../Logos, textures/We-Commerce Logos.png" alt="We-Commerce" style="height: 14px;">
      </div>
      <div class="footer-right">
        <img src="../../Logos, textures/Frame 3.png" alt="fluid" style="height: 22px;">
      </div>
    </div>
  </div>
</body>
</html>
