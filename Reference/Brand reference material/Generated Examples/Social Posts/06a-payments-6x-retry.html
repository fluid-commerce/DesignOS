<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Fluid Payments — 6x Retry (A)</title>
  <link rel="stylesheet" href="base.css">
  <style>
    /* Accent: BLUE — Full-bleed headline, no terminal */
    .tagline {
      font-family: var(--font-hand);
      font-size: 28px;
      font-weight: 700;
      color: var(--blue);
      opacity: 0.85;
      margin-top: 40px;
      position: relative;
      z-index: 4;
    }
  </style>
</head>
<body>
  <div class="card card-ig">
    <!-- Brushstrokes: 03 tall left edge + 02 compact bottom-right -->
    <img class="brush" src="../../Logos, textures/brushstroke03.png" alt="" style="top: -10px; left: -25px; height: 100%; width: auto; opacity: 0.18;">
    <img class="brush" src="../../Logos, textures/brushstroke02.png" alt="" style="bottom: -15px; right: -20px; width: 360px; opacity: 0.16;">

    <div class="side-label">Fluid Payments</div>

    <!-- Blue circle sketch wrapping "six" — no hue filter needed for blue -->
    <img class="circle-sketch" src="../../Logos, textures/circle sketch 1.png" alt="" style="top: 540px; left: 540px; width: 320px; transform: rotate(3deg); opacity: 0.5;">

    <div class="headline headline-mega" style="max-width: 960px; font-size: 110px; line-height: 0.88;">
      Most<br>
      platforms<br>
      try once.<br>
      We try <span class="text-blue">six.</span>
    </div>

    <div class="tagline">Every transaction gets its best shot.</div>

    <div class="footer footer-ig">
      <div class="footer-left">
        <img src="../../Logos, textures/We-Commerce Flags.png" alt="Fluid" style="height: 16px;">
        <span class="sep">|</span>
        <img src="../../Logos, textures/We-Commerce Logos.png" alt="We-Commerce" style="height: 14px;">
      </div>
      <div class="footer-right">
        <img src="../../Logos, textures/Frame 3.png" alt="fluid" style="height: 22px;">
      </div>
    </div>
  </div>
</body>
</html>
