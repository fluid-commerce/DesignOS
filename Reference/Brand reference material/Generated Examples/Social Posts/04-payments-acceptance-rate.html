<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Fluid Payments — Acceptance Rate</title>
  <link rel="stylesheet" href="base.css">
  <style>
    /* Accent: ORANGE only — Big stat hero */
    .stat-hero { display: flex; align-items: baseline; gap: 24px; margin-bottom: 12px; }
    .stat-big { font-family: var(--font-display); font-weight: 900; font-size: 220px; line-height: 0.85; letter-spacing: -0.04em; color: var(--orange); }
    .stat-unit { font-family: var(--font-display); font-weight: 900; font-size: 80px; color: var(--orange); letter-spacing: -0.03em; opacity: 0.7; }
    .stat-context { font-family: var(--font-display); font-weight: 700; font-size: 18px; color: rgba(255,255,255,0.3); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 40px; }
  </style>
</head>
<body>
  <div class="card card-ig">
    <!-- Brushstrokes: 04 tall vertical left side + 07 accent top-right -->
    <img class="brush" src="../../Logos, textures/brushstroke04.png" alt="" style="top: -40px; left: -40px; height: 110%; width: auto; opacity: 0.16;">
    <img class="brush" src="../../Logos, textures/brushstroke07.png" alt="" style="top: -30px; right: -80px; width: 450px; opacity: 0.2;">

    <div class="side-label">Fluid Payments</div>
    <div class="slide-num">01/05</div>

    <!-- Orange-tinted circle sketch around "82" stat -->
    <img class="circle-sketch circle-sketch-orange" src="../../Logos, textures/circle sketch 1.png" alt="" style="top: 200px; left: 30px; width: 340px; transform: rotate(-10deg); opacity: 0.6;">

    <div class="sub-text sub-text-md text-orange" style="margin-bottom: 32px;">The number you're not tracking</div>

    <div class="stat-hero">
      <div class="stat-big">82</div>
      <div class="stat-unit">%</div>
    </div>
    <div class="stat-context">Industry avg acceptance rate</div>

    <div class="headline headline-lg" style="margin-bottom: 28px;">
      You know your<br>
      revenue. Do you<br>
      know your<br>
      acceptance rate?
    </div>

    <div class="body-copy">
      The difference between 82% and 94% isn't a rounding error — it's revenue you already earned and <strong>silently lost.</strong>
    </div>

    <div class="footer footer-ig">
      <div class="footer-left">
        <img src="../../Logos, textures/We-Commerce Flags.png" alt="Fluid" style="height: 16px;">
        <span class="sep">|</span>
        <img src="../../Logos, textures/We-Commerce Logos.png" alt="We-Commerce" style="height: 14px;">
      </div>
      <div class="footer-right">
        <img src="../../Logos, textures/Frame 3.png" alt="fluid" style="height: 22px;">
      </div>
    </div>
  </div>
</body>
</html>
