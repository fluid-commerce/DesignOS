<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Fluid Payments — Hidden Cost (A)</title>
  <link rel="stylesheet" href="base.css">
  <style>
    /* Accent: ORANGE — Giant stat hero */
    .giant-stat {
      font-family: var(--font-display);
      font-weight: 900;
      font-size: 200px;
      line-height: 0.85;
      letter-spacing: -0.04em;
      color: var(--orange);
      position: relative;
      z-index: 4;
      margin-bottom: 28px;
    }
    .tagline {
      font-family: var(--font-hand);
      font-size: 26px;
      font-weight: 700;
      color: var(--orange);
      opacity: 0.8;
      margin-top: 32px;
      position: relative;
      z-index: 4;
    }
  </style>
</head>
<body>
  <div class="card card-ig">
    <!-- Brushstrokes: 04 tall left edge + 01 compact bottom-right -->
    <img class="brush" src="../../Logos, textures/brushstroke04.png" alt="" style="top: -10px; left: -20px; height: 100%; width: auto; opacity: 0.16;">
    <img class="brush" src="../../Logos, textures/brushstroke01.png" alt="" style="bottom: -12px; right: -25px; width: 380px; opacity: 0.13;">

    <div class="side-label">Fluid Payments</div>
    <div class="slide-num">02/05</div>

    <!-- Orange circle sketch wrapping the dollar amount -->
    <img class="circle-sketch circle-sketch-orange" src="../../Logos, textures/circle sketch 1.png" alt="" style="top: 260px; left: 200px; width: 400px; transform: rotate(3deg); opacity: 0.45;">

    <div class="sub-text sub-text-md text-orange" style="margin-bottom: 16px;">The math your CFO hasn't seen</div>

    <div class="giant-stat">$360K</div>

    <div class="headline headline-lg" style="max-width: 800px;">
      The annual cost<br>
      of a "fine"<br>
      <span class="text-orange">decline rate.</span>
    </div>

    <div class="tagline">Your industry is flagged. Your revenue is leaking.</div>

    <div class="footer footer-ig">
      <div class="footer-left">
        <img src="../../Logos, textures/We-Commerce Flags.png" alt="Fluid" style="height: 16px;">
        <span class="sep">|</span>
        <img src="../../Logos, textures/We-Commerce Logos.png" alt="We-Commerce" style="height: 14px;">
      </div>
      <div class="footer-right">
        <img src="../../Logos, textures/Frame 3.png" alt="fluid" style="height: 22px;">
      </div>
    </div>
  </div>
</body>
</html>
