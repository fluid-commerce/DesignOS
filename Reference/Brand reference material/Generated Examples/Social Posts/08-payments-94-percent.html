<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Fluid Payments — 94%+</title>
  <link rel="stylesheet" href="base.css">
  <style>
    /* Accent: GREEN only — Massive stat reframe */
    .stat-block { display: flex; align-items: baseline; margin-bottom: 8px; }
    .stat-giant { font-family: var(--font-display); font-weight: 900; font-size: 260px; line-height: 0.8; letter-spacing: -0.05em; color: var(--green); position: relative; z-index: 4; }
    .stat-suffix { font-family: var(--font-display); font-weight: 900; font-size: 100px; color: var(--green); letter-spacing: -0.03em; margin-left: 8px; position: relative; z-index: 4; }
    .stat-desc { font-family: var(--font-display); font-weight: 700; font-size: 16px; text-transform: uppercase; letter-spacing: 0.12em; color: rgba(255,255,255,0.25); margin-bottom: 48px; position: relative; z-index: 4; }
  </style>
</head>
<body>
  <div class="card card-ig">
    <!-- Brushstrokes: 05 full-width top sweep + 04 bottom-right tall -->
    <img class="brush" src="../../Logos, textures/brushstroke05.png" alt="" style="top: -15px; left: -50px; width: 900px; opacity: 0.22;">
    <img class="brush" src="../../Logos, textures/brushstroke04.png" alt="" style="bottom: -60px; right: -30px; height: 60%; width: auto; opacity: 0.14; transform: rotate(180deg);">

    <div class="side-label">Fluid Payments</div>
    <div class="slide-num">04/05</div>

    <div class="sub-text sub-text-md text-green" style="margin-bottom: 40px;">Fluid Payments acceptance rate</div>

    <div class="stat-block">
      <div class="stat-giant">94</div>
      <div class="stat-suffix">%+</div>
    </div>
    <div class="stat-desc">Acceptance rate across the network</div>

    <div class="headline" style="font-size: 48px; margin-bottom: 24px;">
      Invisible when<br>
      it works.<br>
      Relentless<br>
      when it doesn't.
    </div>

    <div class="body-copy">
      Intelligent routing. Cascade recovery. Subscription retry with payday alignment. <strong>Every transaction gets its best shot.</strong>
    </div>

    <div class="footer footer-ig">
      <div class="footer-left">
        <img src="../../Logos, textures/We-Commerce Flags.png" alt="Fluid" style="height: 16px;">
        <span class="sep">|</span>
        <img src="../../Logos, textures/We-Commerce Logos.png" alt="We-Commerce" style="height: 14px;">
      </div>
      <div class="footer-right">
        <img src="../../Logos, textures/Frame 3.png" alt="fluid" style="height: 22px;">
      </div>
    </div>
  </div>
</body>
</html>
