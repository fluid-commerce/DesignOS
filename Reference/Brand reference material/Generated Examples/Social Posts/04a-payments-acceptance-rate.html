<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Fluid Payments — Acceptance Rate (Variation A)</title>
  <link rel="stylesheet" href="base.css">
  <style>
    /* Accent: PURPLE only — Headline + dark card with math */
    .math-row {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 12px;
    }
    .math-num {
      font-family: var(--font-display);
      font-weight: 900;
      font-size: 56px;
      letter-spacing: -0.03em;
      line-height: 1;
    }
    .math-op {
      font-family: var(--font-display);
      font-weight: 300;
      font-size: 40px;
      color: rgba(255,255,255,0.2);
    }
    .math-label {
      font-family: var(--font-display);
      font-weight: 500;
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: rgba(255,255,255,0.3);
      margin-top: 4px;
    }
    .math-divider {
      height: 1px;
      background: rgba(255,255,255,0.06);
      margin: 18px 0;
    }
    .math-result-row {
      display: flex;
      align-items: baseline;
      gap: 12px;
    }
    .math-result-label {
      font-family: var(--font-hand);
      font-weight: 700;
      font-size: 20px;
      color: var(--purple);
    }
  </style>
</head>
<body>
  <div class="card card-ig">
    <!-- Brushstrokes: 06 wide top + 03 tall right edge -->
    <img class="brush" src="../../Logos, textures/brushstroke06.png" alt="" style="top: -18px; left: -40px; width: 750px; opacity: 0.18;">
    <img class="brush" src="../../Logos, textures/brushstroke03.png" alt="" style="top: -20px; right: -35px; height: 110%; width: auto; opacity: 0.16;">

    <div class="side-label">Fluid Payments</div>
    <div class="slide-num">01/05</div>

    <div class="sub-text sub-text-md text-purple" style="margin-bottom: 28px;">The gap is your revenue</div>

    <div class="headline headline-ig" style="margin-bottom: 36px;">
      The gap between<br>
      <span class="text-purple">82%</span> and <span class="text-purple">94%</span><br>
      is your<br>
      revenue.
    </div>

    <div class="dark-card" style="padding: 32px;">
      <div class="math-row">
        <div>
          <div class="math-num text-dim">82%</div>
          <div class="math-label">Industry avg</div>
        </div>
        <div class="math-op">&rarr;</div>
        <div>
          <div class="math-num text-purple">94%</div>
          <div class="math-label">With Fluid</div>
        </div>
      </div>
      <div class="math-divider"></div>
      <div class="math-result-row">
        <div class="math-result-label">= 12% of revenue you already earned, recovered.</div>
      </div>
    </div>

    <div style="margin-top: 28px;">
      <div class="sub-text sub-text-lg text-purple">Stop leaving money on the table.</div>
    </div>

    <div class="footer footer-ig">
      <div class="footer-left">
        <img src="../../Logos, textures/We-Commerce Flags.png" alt="Fluid" style="height: 16px;">
        <span class="sep">|</span>
        <img src="../../Logos, textures/We-Commerce Logos.png" alt="We-Commerce" style="height: 14px;">
      </div>
      <div class="footer-right">
        <img src="../../Logos, textures/Frame 3.png" alt="fluid" style="height: 22px;">
      </div>
    </div>
  </div>
</body>
</html>
