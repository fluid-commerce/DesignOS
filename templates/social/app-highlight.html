<!DOCTYPE html>
<!-- target: 1080x1080 -->
<html lang="en">
<head>
<meta charset="UTF-8"/>
<style>
  @font-face {
    font-family: 'flfontbold';
    src: url('/api/brand-assets/serve/flfontbold') format('truetype');
    font-weight: 700;
    font-style: normal;
  }
  @font-face {
    font-family: 'NeueHaas';
    src: url('/api/brand-assets/serve/Inter-VariableFont') format('truetype');
    font-weight: 100 900;
    font-style: normal;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    width: 1080px;
    height: 1080px;
    margin: 0;
    overflow: hidden;
    background: #000;
    position: relative;
    font-family: 'NeueHaas', sans-serif;
  }

  /* ── Brushstroke texture: top-right ── */
  .brush-top-right {
    position: absolute;
    top: -20px;
    right: -30px;
    width: 480px;
    height: auto;
    mix-blend-mode: screen;
    opacity: 0.12;
    pointer-events: none;
    z-index: 1;
  }

  /* ── Brushstroke texture: bottom-left ── */
  .brush-bottom-left {
    position: absolute;
    bottom: -30px;
    left: -40px;
    width: 520px;
    height: auto;
    mix-blend-mode: screen;
    opacity: 0.15;
    pointer-events: none;
    z-index: 1;
  }

  /* ── SLOT: HEADLINE ── */
  .headline {
    position: absolute;
    left: 46px;
    top: 167px;
    width: 988px;
    font-weight: 900;
    font-size: 168px;
    line-height: 0.75;
    color: #ffffff;
    text-align: center;
    text-transform: uppercase;
    letter-spacing: -0.03em;
    z-index: 2;
  }

  /* ── Category label: rotated on right edge ── */
  .category {
    position: absolute;
    right: 28px;
    top: 88px;
    width: 19px;
    height: 224px;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 5;
  }
  .category span {
    font-weight: 700;
    font-size: 11px;
    line-height: 1;
    color: rgba(255,255,255,0.35);
    white-space: nowrap;
    transform: rotate(90deg);
    display: block;
    text-transform: uppercase;
    letter-spacing: 0.15em;
  }

  /* ── Slide number ── */
  .slide-num {
    position: absolute;
    right: 16px;
    top: 45px;
    font-weight: 700;
    font-size: 13px;
    color: rgba(255,255,255,0.40);
    text-align: right;
    white-space: nowrap;
    z-index: 5;
  }

  /* ── SLOT: MOCKUP ── */
  .mockup {
    position: absolute;
    left: -1px;
    top: 450px;
    width: 1082px;
    height: 630px;
    overflow: hidden;
    z-index: 3;
  }
  .mockup img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    pointer-events: none;
  }

  /* ── SLOT: ACCENT_LABEL ── */
  .accent-label {
    position: absolute;
    left: 742px;
    top: 447px;
    width: 274px;
    height: 229px;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10;
  }
  .accent-label p {
    font-family: 'flfontbold', sans-serif;
    font-size: 46px;
    line-height: 0.9;
    color: #42b1ff;
    transform: rotate(-28.61deg);
    transform-origin: center center;
    white-space: pre;
  }

  /* ── Footer ── */
  .footer {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 22px 68px;
    z-index: 10;
  }
  .footer-left {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .footer-left img {
    height: 18px;
    opacity: 0.8;
  }
  .footer-separator {
    width: 1px;
    height: 14px;
    background: rgba(255,255,255,0.15);
  }
  .footer-right img {
    height: 22px;
    opacity: 0.8;
  }
</style>
</head>
<body>

  <!-- Brushstroke: top-right edge-bleed -->
  <img class="brush-top-right" src="/api/brand-assets/serve/brush-texture-05" alt="">

  <!-- Brushstroke: bottom-left edge-bleed -->
  <img class="brush-bottom-left" src="/api/brand-assets/serve/brush-texture-04" alt="">

  <!-- SLOT: SLIDE_NUM -->
  <p class="slide-num">01/12</p>

  <!-- SLOT: CATEGORY -->
  <div class="category">
    <span>App Highlight</span>
  </div>

  <!-- SLOT: HEADLINE -->
  <p class="headline">YOUR ONE STOP SHOP FOR REPS</p>

  <!-- SLOT: MOCKUP -->
  <div class="mockup">
    <img src="" alt="App screenshot mockup">
  </div>

  <!-- SLOT: ACCENT_LABEL -->
  <div class="accent-label">
    <p>APP Feature
Highlight Share!</p>
  </div>

  <!-- Footer -->
  <footer class="footer">
    <div class="footer-left">
      <img src="/api/brand-assets/serve/wecommerce-flags" alt="We-Commerce">
      <div class="footer-separator"></div>
      <img src="/api/brand-assets/serve/wecommerce-logos" alt="We-Commerce">
    </div>
    <div class="footer-right">
      <img src="/api/brand-assets/serve/frame-3-fluid-dots" alt="Fluid">
    </div>
  </footer>

</body>
</html>
