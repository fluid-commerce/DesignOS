<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<style>
  @font-face {
    font-family: 'flfontbold';
    src: url('../../assets/fonts/flfontbold.ttf') format('truetype');
    font-weight: 700;
  }
  @font-face {
    font-family: 'NeueHaas';
    src: url('../../assets/fonts/Inter-VariableFont.ttf') format('truetype');
    font-weight: 100 900;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body { min-height: 100vh; background: #111; }
  body { display: flex; justify-content: center; align-items: center; }

  .canvas {
    width: 1080px;
    height: 1080px;
    overflow: hidden;
    background: #000;
    position: relative;
    flex-shrink: 0;
  }

  /* ── Headline: centered, 168.68px, lh:0.75 ── */
  .headline {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    top: 45px;
    width: 936px;
    font-family: 'NeueHaas', sans-serif;
    font-weight: 900;
    font-size: 168.68px;
    line-height: 0.75;
    color: #ffffff;
    text-align: center;
  }

  /* ── Category label: top-right, rotated 90° ── */
  .category {
    position: absolute;
    left: 1026px;
    top: 45px;
    width: 19px;
    height: 193px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .category span {
    font-family: 'NeueHaas', sans-serif;
    font-weight: 700;
    font-size: 24px;
    line-height: 0.8;
    color: #ffffff;
    white-space: nowrap;
    transform: rotate(90deg);
    display: block;
  }

  /* ── Employee photo: centered horizontally ── */
  .employee-photo {
    position: absolute;
    left: 408px;
    top: 494px;
    width: 263px;
    height: 327px;
    overflow: hidden;
    background: #1a1a1a;
  }
  .employee-photo img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center top;
    pointer-events: none;
  }

  /* ── Employee name: centered, below photo ── */
  .employee-name {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    top: 835px;
    font-family: 'NeueHaas', sans-serif;
    font-weight: 900;
    font-size: 89.684px;
    line-height: 0.8;
    color: #ffffff;
    white-space: nowrap;
  }

  /* ── Employee title: centered, flfontbold, orange ── */
  .employee-title {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    top: 910px;
    font-family: 'flfontbold', sans-serif;
    font-size: 68px;
    line-height: 1;
    color: #FF6715;
    white-space: nowrap;
  }

  /* ── Bottom-left: flag + divider + WeCommerce logo ── */
  .wc-logo-row {
    position: absolute;
    left: 35px;
    top: 982px;
    display: flex;
    align-items: center;
    gap: 12px;
    height: 48px;
  }
  .wc-logo-row .flag-img {
    width: 53px;
    height: 48px;
    flex-shrink: 0;
  }
  .wc-logo-row .logo-divider {
    width: 1px;
    height: 34px;
    background: #2a2a2a;
    flex-shrink: 0;
  }
  .wc-logo-row .wc-img {
    height: 30px;
    width: 118px;
    object-fit: contain;
    object-position: left center;
    flex-shrink: 0;
  }

  /* ── Fluid logo: bottom right ── */
  .fluid-logo {
    position: absolute;
    right: 35px;
    top: 994px;
    height: 22px;
    display: flex;
    align-items: center;
  }
  .fluid-logo img {
    height: 22px;
    width: auto;
    pointer-events: none;
  }
</style>
</head>
<body>
<div class="canvas">

  <!-- Headline -->
  <p class="headline">Every transaction<br>matters</p>

  <!-- Category label (rotated) -->
  <div class="category">
    <span>Spotlight</span>
  </div>

  <!-- Employee photo -->
  <div class="employee-photo">
    <img src="../../assets/photos/person-holly.png" alt="">
  </div>

  <!-- Employee name -->
  <p class="employee-name">Dan England</p>

  <!-- Employee title -->
  <p class="employee-title">VP Payments + Risk</p>

  <!-- Bottom-left: flag + divider + WeCommerce logo -->
  <div class="wc-logo-row">
    <img class="flag-img" src="../../assets/logos/flag-icon.svg" alt="">
    <div class="logo-divider"></div>
    <img class="wc-img" src="../../assets/logos/wecommerce-logo.svg" alt="">
  </div>

  <!-- Fluid logo (bottom right) -->
  <div class="fluid-logo">
    <img src="../../assets/logos/fluid-logo.png" alt="fluid">
  </div>

</div><!-- /.canvas -->
<script src="nav.js"></script>
</body>
</html>
