<!DOCTYPE html>
<!-- target: 1080x1080 -->
<html lang="en">
<head>
<meta charset="UTF-8"/>
<style>
  @font-face {
    font-family: 'flfontbold';
    src: url('/api/brand-assets/serve/flfontbold') format('truetype');
    font-weight: 700;
    font-style: normal;
  }
  @font-face {
    font-family: 'NeueHaas';
    src: url('/api/brand-assets/serve/Inter-VariableFont') format('truetype');
    font-weight: 100 900;
    font-style: normal;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    width: 1080px;
    height: 1080px;
    margin: 0;
    overflow: hidden;
    background: #000;
    position: relative;
    font-family: 'NeueHaas', sans-serif;
  }

  /* ── Brushstroke texture: top-right ── */
  .brush-top-right {
    position: absolute;
    top: -30px;
    right: -40px;
    width: 500px;
    height: auto;
    mix-blend-mode: screen;
    opacity: 0.15;
    pointer-events: none;
    transform: rotate(-5deg);
  }

  /* ── Brushstroke texture: bottom-left ── */
  .brush-bottom-left {
    position: absolute;
    bottom: -20px;
    left: -50px;
    width: 550px;
    height: auto;
    mix-blend-mode: screen;
    opacity: 0.12;
    pointer-events: none;
    transform: rotate(3deg);
  }

  /* ── Photo: left:35 top:46 ── */
  .photo {
    position: absolute;
    left: 35px;
    top: 46px;
    width: 353px;
    height: 439px;
    overflow: hidden;
    background: rgba(255,255,255,0.03);
  }
  .photo img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    pointer-events: none;
  }

  /* ── SLOT: NAME ── */
  .name {
    position: absolute;
    left: 411px;
    top: 46px;
    font-weight: 900;
    font-size: 108px;
    line-height: 0.8;
    color: #ffffff;
    text-transform: uppercase;
    letter-spacing: -0.03em;
    white-space: pre;
  }

  /* ── SLOT: TITLE ── */
  .title {
    position: absolute;
    left: 411px;
    top: 217px;
    font-family: 'flfontbold', sans-serif;
    font-size: 68px;
    line-height: 1;
    color: #42b1ff;
    white-space: pre;
  }

  /* ── SLOT: HANDLE ── */
  .handle {
    position: absolute;
    left: 411px;
    top: 353px;
    font-family: 'flfontbold', sans-serif;
    font-size: 36px;
    line-height: 1;
    color: #42b1ff;
    white-space: nowrap;
  }

  /* ── Category label: rotated on right edge ── */
  .category {
    position: absolute;
    right: 28px;
    top: 45px;
    width: 19px;
    height: 193px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .category span {
    font-weight: 700;
    font-size: 11px;
    line-height: 1;
    color: rgba(255,255,255,0.35);
    white-space: nowrap;
    transform: rotate(90deg);
    display: block;
    text-transform: uppercase;
    letter-spacing: 0.15em;
  }

  /* ── SLOT: QUOTE ── */
  .quote {
    position: absolute;
    left: 57px;
    top: 552px;
    width: 921px;
    font-weight: 900;
    font-size: 56px;
    line-height: 1;
    color: #ffffff;
    white-space: pre-wrap;
    text-indent: -25px;
    padding-left: 25px;
  }

  /* ── SLOT: TAGLINE ── */
  .tagline {
    position: absolute;
    left: 57px;
    bottom: 100px;
    font-family: 'flfontbold', sans-serif;
    font-size: 28px;
    color: #42b1ff;
  }

  /* ── Footer ── */
  .footer {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 22px 68px;
    z-index: 10;
  }
  .footer-left {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .footer-left img {
    height: 18px;
    opacity: 0.8;
  }
  .footer-separator {
    width: 1px;
    height: 14px;
    background: rgba(255,255,255,0.15);
  }
  .footer-right img {
    height: 22px;
    opacity: 0.8;
  }
</style>
</head>
<body>

  <!-- Brushstroke: top-right edge-bleed -->
  <img class="brush-top-right" src="/api/brand-assets/serve/brush-texture-01" alt="">

  <!-- Brushstroke: bottom-left edge-bleed -->
  <img class="brush-bottom-left" src="/api/brand-assets/serve/brush-texture-02" alt="">

  <!-- SLOT: PHOTO -->
  <div class="photo">
    <img src="" alt="Portrait photo">
  </div>

  <!-- SLOT: NAME -->
  <p class="name">Kohlmann
Kearley</p>

  <!-- SLOT: TITLE -->
  <p class="title">Design &amp; Solutions
Architect</p>

  <!-- SLOT: HANDLE -->
  <p class="handle">@NEumi</p>

  <!-- SLOT: CATEGORY -->
  <div class="category">
    <span>Client Testimonial</span>
  </div>

  <!-- SLOT: QUOTE -->
  <p class="quote">"My favorite spicy feedback from this week:

'I get it now; you guys just had the cojones to build all the pieces direct sales needs in one system.'"</p>

  <!-- SLOT: TAGLINE -->
  <p class="tagline">Every transaction matters.</p>

  <!-- Footer -->
  <footer class="footer">
    <div class="footer-left">
      <img src="/api/brand-assets/serve/wecommerce-flags" alt="We-Commerce">
      <div class="footer-separator"></div>
      <img src="/api/brand-assets/serve/wecommerce-logos" alt="We-Commerce">
    </div>
    <div class="footer-right">
      <img src="/api/brand-assets/serve/frame-3-fluid-dots" alt="Fluid">
    </div>
  </footer>

</body>
</html>
