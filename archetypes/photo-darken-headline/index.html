<!DOCTYPE html>
<!-- archetype: photo-darken-headline | target: 1080x1350 (instagram-portrait) -->
<!-- Layout: full-bleed photo background, darkened overlay, headline + sub centered/left -->
<html lang="en">
<head>
<meta charset="UTF-8"/>
<style>
  body {
    width: 1080px;
    height: 1350px;
    position: relative;
    background: #111;
  }

  /* SLOT: hero-photo */
  .hero-photo {
    position: absolute;
    inset: 0;
    z-index: 1;
  }

  .hero-photo img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .darken-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(
      to bottom,
      rgba(0,0,0,0.15) 0%,
      rgba(0,0,0,0.10) 35%,
      rgba(0,0,0,0.55) 65%,
      rgba(0,0,0,0.80) 100%
    );
    z-index: 2;
    pointer-events: none;
  }

  /* SLOT: .eyebrow */
  .eyebrow {
    position: absolute;
    left: 68px;
    bottom: 370px;
    width: 800px;
    font-size: 26px;
    font-weight: 500;
    letter-spacing: 0.18em;
    color: rgba(255, 255, 255, 0.6);
    z-index: 3;
  }

  /* SLOT: .headline */
  .headline {
    position: absolute;
    left: 68px;
    bottom: 190px;
    width: 944px;
    font-size: 100px;
    font-weight: 900;
    line-height: 0.9;
    letter-spacing: -0.02em;
    color: var(--text-primary);
    z-index: 3;
  }

  /* SLOT: .sub-copy */
  .sub-copy {
    position: absolute;
    left: 68px;
    bottom: 80px;
    width: 800px;
    font-size: 30px;
    font-weight: 400;
    line-height: 1.4;
    color: rgba(255, 255, 255, 0.65);
    z-index: 3;
  }
</style>
</head>
<body>
  <!-- BACKGROUND LAYER: brand fills with textures, brushstrokes -->
  <div class="background-layer"></div>

  <!-- SLOT: hero-photo -->
  <div class="hero-photo">
    <img src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNk+M9QDwADhgGAWjR9awAAAABJRU5ErkJggg==" alt="">
  </div>

  <div class="darken-overlay"></div>

  <!-- SLOT: eyebrow -->
  <div class="eyebrow">Brand · Campaign</div>

  <!-- SLOT: headline -->
  <p class="headline">Build something worth noticing</p>

  <!-- SLOT: sub-copy -->
  <p class="sub-copy">Link in bio for the full story.</p>

  <!-- FOREGROUND LAYER: brand fills with borders (footer, header, etc.) -->
  <div class="foreground-layer"></div>
</body>
</html>
