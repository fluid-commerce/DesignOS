<!DOCTYPE html>
<!-- archetype: hero-stat | target: 1080x1080 -->
<html lang="en">
<head>
<meta charset="UTF-8"/>
<style>
  body {
    width: 1080px;
    height: 1080px;
  }

  /* SLOT: .eyebrow */
  .eyebrow {
    position: absolute;
    left: 68px;
    top: 100px;
    width: 944px;
    font-size: 38px;
    font-weight: 500;
    letter-spacing: 0.1em;
    color: var(--text-secondary);
    z-index: 2;
  }

  /* SLOT: .headline */
  .headline {
    position: absolute;
    left: 68px;
    top: 160px;
    width: 944px;
    font-size: 120px;
    font-weight: 900;
    line-height: 0.88;
    letter-spacing: -0.03em;
    color: var(--text-primary);
    z-index: 2;
  }

  .stat-row {
    position: absolute;
    left: 68px;
    right: 68px;
    bottom: 120px;
    display: flex;
    gap: 60px;
    z-index: 2;
  }

  .stat-item {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  /* SLOT: .stat-1-num */
  .stat-1-num,
  .stat-2-num,
  .stat-3-num {
    font-size: 88px;
    font-weight: 900;
    line-height: 0.85;
    letter-spacing: -0.03em;
    color: var(--text-primary);
  }

  /* SLOT: .stat-1-label */
  .stat-1-label,
  .stat-2-label,
  .stat-3-label {
    font-size: 32px;
    font-weight: 500;
    letter-spacing: 0.1em;
    color: var(--text-secondary);
  }

  /* SLOT: .body-copy */
  .body-copy {
    position: absolute;
    left: 68px;
    bottom: 300px;
    width: 700px;
    font-size: 36px;
    font-weight: 400;
    line-height: 1.4;
    color: var(--text-body);
    z-index: 2;
  }
</style>
</head>
<body>
  <!-- BACKGROUND LAYER: brand fills with textures, brushstrokes -->
  <div class="background-layer"></div>

  <!-- SLOT: eyebrow -->
  <p class="eyebrow">Annual report highlights</p>

  <!-- SLOT: headline -->
  <p class="headline">The numbers speak for themselves</p>

  <!-- SLOT: body-copy -->
  <p class="body-copy">Three metrics that defined the quarter and set the trajectory for what comes next.</p>

  <div class="stat-row">
    <div class="stat-item">
      <!-- SLOT: stat-1-num -->
      <div class="stat-1-num">94%</div>
      <!-- SLOT: stat-1-label -->
      <div class="stat-1-label">Approval rate</div>
    </div>
    <div class="stat-item">
      <!-- SLOT: stat-2-num -->
      <div class="stat-2-num">2.4x</div>
      <!-- SLOT: stat-2-label -->
      <div class="stat-2-label">Revenue growth</div>
    </div>
    <div class="stat-item">
      <!-- SLOT: stat-3-num -->
      <div class="stat-3-num">47ms</div>
      <!-- SLOT: stat-3-label -->
      <div class="stat-3-label">Response time</div>
    </div>
  </div>
  <!-- FOREGROUND LAYER: brand fills with borders (footer, header, etc.) -->
  <div class="foreground-layer"></div>
</body>
</html>
