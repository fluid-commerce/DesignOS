<!DOCTYPE html>
<!-- archetype: website-launch-mockup | target: 1080x1350 (instagram-portrait) -->
<!-- Source: Modern_Website_Launch_Digital_Product_Mockup -->
<!-- Layout: bold headline left, mockup image right-center, URL + CTA bottom -->
<html lang="en">
<head>
<meta charset="UTF-8"/>
<style>
  body {
    width: 1080px;
    height: 1350px;
    position: relative;
    background: #111;
  }

  /* SLOT: .announcement-type */
  .announcement-type {
    position: absolute;
    left: 68px;
    top: 108px;
    font-size: 26px;
    font-weight: 500;
    letter-spacing: 0.18em;
    color: rgba(255, 255, 255, 0.4);
    z-index: 2;
  }

  /* SLOT: .launch-headline */
  .launch-headline {
    position: absolute;
    left: 68px;
    top: 168px;
    width: 600px;
    font-size: 110px;
    font-weight: 900;
    line-height: 0.88;
    letter-spacing: -0.02em;
    color: var(--text-primary);
    z-index: 2;
  }

  /* SLOT: mockup-screen */
  .mockup-screen {
    position: absolute;
    right: 68px;
    top: 400px;
    width: 560px;
    height: 700px;
    overflow: hidden;
    z-index: 2;
  }

  .mockup-screen img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  /* SLOT: .launch-url */
  .launch-url {
    position: absolute;
    left: 68px;
    bottom: 220px;
    width: 600px;
    font-size: 34px;
    font-weight: 400;
    letter-spacing: 0.05em;
    color: rgba(255, 255, 255, 0.6);
    z-index: 2;
  }

  /* SLOT: .cta-text */
  .cta-text {
    position: absolute;
    left: 68px;
    bottom: 108px;
    width: 700px;
    font-size: 30px;
    font-weight: 400;
    line-height: 1.4;
    color: rgba(255, 255, 255, 0.4);
    z-index: 2;
  }
</style>
</head>
<body>
  <!-- BACKGROUND LAYER: brand fills with textures, brushstrokes -->
  <div class="background-layer"></div>

  <!-- SLOT: announcement-type -->
  <div class="announcement-type">NEW LAUNCH</div>

  <!-- SLOT: launch-headline -->
  <p class="launch-headline">WEBSITE LAUNCH</p>

  <!-- SLOT: mockup-screen -->
  <div class="mockup-screen">
    <img src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNk+M9QDwADhgGAWjR9awAAAABJRU5ErkJggg==" alt="">
  </div>

  <!-- SLOT: launch-url -->
  <div class="launch-url">www.yourbrand.com</div>

  <!-- SLOT: cta-text -->
  <p class="cta-text">Go explore — link in bio</p>

  <!-- FOREGROUND LAYER: brand fills with borders (footer, header, etc.) -->
  <div class="foreground-layer"></div>
</body>
</html>
