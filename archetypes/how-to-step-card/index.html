<!DOCTYPE html>
<!-- archetype: how-to-step-card | target: 1080x1350 (instagram-portrait) -->
<!-- Source: Beige_Professional_Minimalist_How_to_Carousel (content slides 2-4) -->
<!-- Layout: series label top, step number left accent, step headline + body, photo right -->
<html lang="en">
<head>
<meta charset="UTF-8"/>
<style>
  body {
    width: 1080px;
    height: 1350px;
    position: relative;
    background: #111;
  }

  /* SLOT: .series-label */
  .series-label {
    position: absolute;
    left: 68px;
    top: 108px;
    font-size: 24px;
    font-weight: 600;
    letter-spacing: 0.16em;
    color: rgba(255, 255, 255, 0.4);
    z-index: 2;
  }

  /* SLOT: step-photo */
  .step-photo {
    position: absolute;
    left: 68px;
    top: 200px;
    width: 440px;
    height: 560px;
    overflow: hidden;
    z-index: 2;
    border-radius: 16px;
  }

  .step-photo img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  /* SLOT: .step-number */
  .step-number {
    position: absolute;
    left: 560px;
    top: 200px;
    font-size: 80px;
    font-weight: 300;
    font-style: italic;
    letter-spacing: -0.02em;
    color: rgba(255, 255, 255, 0.3);
    z-index: 2;
  }

  /* SLOT: .step-headline */
  .step-headline {
    position: absolute;
    left: 560px;
    top: 310px;
    width: 440px;
    font-size: 64px;
    font-weight: 900;
    line-height: 0.92;
    letter-spacing: -0.02em;
    color: var(--text-primary);
    z-index: 2;
  }

  /* SLOT: .step-body */
  .step-body {
    position: absolute;
    left: 68px;
    bottom: 230px;
    width: 944px;
    font-size: 34px;
    font-weight: 400;
    line-height: 1.55;
    color: rgba(255, 255, 255, 0.7);
    z-index: 2;
  }

  /* SLOT: .page-indicator */
  .page-indicator {
    position: absolute;
    right: 68px;
    bottom: 108px;
    font-size: 26px;
    font-weight: 500;
    letter-spacing: 0.1em;
    color: rgba(255, 255, 255, 0.35);
    z-index: 2;
  }
</style>
</head>
<body>
  <!-- BACKGROUND LAYER: brand fills with textures, brushstrokes -->
  <div class="background-layer"></div>

  <!-- SLOT: series-label -->
  <div class="series-label">PRODUCTIVITY TIPS</div>

  <!-- SLOT: step-photo -->
  <div class="step-photo">
    <img src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNk+M9QDwADhgGAWjR9awAAAABJRU5ErkJggg==" alt="">
  </div>

  <!-- SLOT: step-number -->
  <div class="step-number">01.</div>

  <!-- SLOT: step-headline -->
  <p class="step-headline">Set your intention before you open your phone</p>

  <!-- SLOT: step-body -->
  <p class="step-body">Before checking email or social media, spend 5 minutes writing down your single most important task for the day. This one habit shifts you from reactive to intentional.</p>

  <!-- SLOT: page-indicator -->
  <div class="page-indicator">01 / 05 →</div>

  <!-- FOREGROUND LAYER: brand fills with borders (footer, header, etc.) -->
  <div class="foreground-layer"></div>
</body>
</html>
