<!DOCTYPE html>
<!-- archetype: book-quote-highlight | target: 1080x1350 (instagram-portrait) -->
<!-- Source: Black_Beige_and_Yellow_Book_Review_Quote_Highlight -->
<!-- Layout: review header top, hero image left, annotation callouts right, excerpt bottom -->
<html lang="en">
<head>
<meta charset="UTF-8"/>
<style>
  body {
    width: 1080px;
    height: 1350px;
    position: relative;
    background: #111;
  }

  /* SLOT: .review-header */
  .review-header {
    position: absolute;
    left: 68px;
    top: 60px;
    font-size: 48px;
    font-weight: 900;
    letter-spacing: 0.06em;
    color: var(--text-primary);
    z-index: 2;
  }

  /* SLOT: .rating-label */
  .rating-label {
    position: absolute;
    left: 68px;
    top: 128px;
    font-size: 28px;
    font-weight: 500;
    font-style: italic;
    color: rgba(255, 255, 255, 0.6);
    z-index: 2;
  }

  /* SLOT: .cover-image */
  .cover-image {
    position: absolute;
    left: 68px;
    top: 210px;
    width: 380px;
    height: 600px;
    overflow: hidden;
    z-index: 2;
  }

  .cover-image img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  /* SLOT: .callout-1 */
  .callout-1 {
    position: absolute;
    left: 500px;
    top: 220px;
    width: 520px;
    font-size: 30px;
    font-weight: 400;
    font-style: italic;
    line-height: 1.45;
    color: rgba(255, 255, 255, 0.75);
    z-index: 2;
  }

  /* SLOT: .callout-2 */
  .callout-2 {
    position: absolute;
    left: 500px;
    top: 390px;
    width: 520px;
    font-size: 30px;
    font-weight: 400;
    font-style: italic;
    line-height: 1.45;
    color: rgba(255, 255, 255, 0.75);
    z-index: 2;
  }

  /* SLOT: .callout-3 */
  .callout-3 {
    position: absolute;
    left: 500px;
    top: 560px;
    width: 520px;
    font-size: 30px;
    font-weight: 400;
    font-style: italic;
    line-height: 1.45;
    color: rgba(255, 255, 255, 0.75);
    z-index: 2;
  }

  /* SLOT: .excerpt-label */
  .excerpt-label {
    position: absolute;
    left: 68px;
    top: 870px;
    font-size: 22px;
    font-weight: 600;
    letter-spacing: 0.12em;
    color: rgba(255, 255, 255, 0.4);
    z-index: 2;
  }

  /* SLOT: .excerpt-text */
  .excerpt-text {
    position: absolute;
    left: 68px;
    top: 912px;
    width: 944px;
    font-size: 38px;
    font-weight: 400;
    line-height: 1.55;
    color: rgba(255, 255, 255, 0.8);
    z-index: 2;
  }
</style>
</head>
<body>
  <!-- BACKGROUND LAYER: brand fills with textures, brushstrokes -->
  <div class="background-layer"></div>

  <!-- SLOT: review-header -->
  <div class="review-header">Quick Review</div>

  <!-- SLOT: rating-label -->
  <div class="rating-label">I'd say: 4 out of 5</div>

  <!-- SLOT: cover-image -->
  <div class="cover-image">
    <img src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNk+M9QDwADhgGAWjR9awAAAABJRU5ErkJggg==" alt="">
  </div>

  <!-- SLOT: callout-1 -->
  <div class="callout-1">A story you have never heard before</div>

  <!-- SLOT: callout-2 -->
  <div class="callout-2">An ending you will not see coming</div>

  <!-- SLOT: callout-3 -->
  <div class="callout-3">A total page-turner, read in one sitting</div>

  <!-- SLOT: excerpt-label -->
  <div class="excerpt-label">From the book</div>

  <!-- SLOT: excerpt-text -->
  <p class="excerpt-text">"You cannot rewind time, but you can choose how the next chapter begins."</p>

  <!-- FOREGROUND LAYER: brand fills with borders (footer, header, etc.) -->
  <div class="foreground-layer"></div>
</body>
</html>
