<!DOCTYPE html>
<!-- archetype: event-promo | target: 1080x1350 (instagram-portrait) -->
<!-- Source: Black_and_White_Typographic_Pop-Up_Market_Instagram_Post -->
<!-- Layout: presenter top, bold event name center, details bottom band, photo BG -->
<html lang="en">
<head>
<meta charset="UTF-8"/>
<style>
  body {
    width: 1080px;
    height: 1350px;
    position: relative;
    background: #111;
  }

  /* SLOT: event-photo */
  .event-photo {
    position: absolute;
    inset: 0;
    z-index: 1;
  }

  .event-photo img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    opacity: 0.45;
  }

  /* SLOT: .presenter-line */
  .presenter-line {
    position: absolute;
    left: 0;
    right: 0;
    top: 100px;
    text-align: center;
    font-size: 22px;
    font-weight: 500;
    letter-spacing: 0.2em;
    color: rgba(255, 255, 255, 0.7);
    z-index: 2;
  }

  /* SLOT: .event-name */
  .event-name {
    position: absolute;
    left: 68px;
    right: 68px;
    top: 460px;
    text-align: center;
    font-size: 120px;
    font-weight: 900;
    letter-spacing: 0.04em;
    line-height: 0.88;
    color: var(--text-primary);
    z-index: 2;
  }

  /* SLOT: .event-description */
  .event-description {
    position: absolute;
    left: 68px;
    right: 68px;
    top: 720px;
    text-align: center;
    font-size: 32px;
    font-weight: 400;
    line-height: 1.5;
    color: rgba(255, 255, 255, 0.7);
    z-index: 2;
  }

  .info-band {
    position: absolute;
    left: 0;
    right: 0;
    bottom: 0;
    height: 240px;
    background: rgba(0, 0, 0, 0.7);
    z-index: 2;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 60px;
    padding: 0 68px;
  }

  .info-item {
    display: flex;
    flex-direction: column;
    gap: 6px;
    text-align: center;
  }

  .info-item-label {
    font-size: 20px;
    font-weight: 500;
    letter-spacing: 0.14em;
    color: rgba(255, 255, 255, 0.4);
  }

  /* SLOT: .event-date */
  .event-date {
    font-size: 36px;
    font-weight: 700;
    color: #ffffff;
  }

  /* SLOT: .event-time */
  .event-time {
    font-size: 36px;
    font-weight: 700;
    color: #ffffff;
  }

  /* SLOT: .event-location */
  .event-location {
    font-size: 30px;
    font-weight: 500;
    color: rgba(255, 255, 255, 0.85);
    max-width: 260px;
  }
</style>
</head>
<body>
  <!-- BACKGROUND LAYER: brand fills with textures, brushstrokes -->
  <div class="background-layer"></div>

  <!-- SLOT: event-photo -->
  <div class="event-photo">
    <img src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNk+M9QDwADhgGAWjR9awAAAABJRU5ErkJggg==" alt="">
  </div>

  <!-- SLOT: presenter-line -->
  <div class="presenter-line">YOUR BRAND PRESENTS</div>

  <!-- SLOT: event-name -->
  <p class="event-name">POP-UP EVENT</p>

  <!-- SLOT: event-description -->
  <p class="event-description">Handcrafted goods, community vibes, and experiences you won't find anywhere else.</p>

  <div class="info-band">
    <div class="info-item">
      <div class="info-item-label">DATE</div>
      <!-- SLOT: event-date -->
      <div class="event-date">NOV 14–15</div>
    </div>
    <div class="info-item">
      <div class="info-item-label">HOURS</div>
      <!-- SLOT: event-time -->
      <div class="event-time">12PM–8PM</div>
    </div>
    <div class="info-item">
      <div class="info-item-label">LOCATION</div>
      <!-- SLOT: event-location -->
      <div class="event-location">45 Market St, Downtown</div>
    </div>
  </div>

  <!-- FOREGROUND LAYER: brand fills with borders (footer, header, etc.) -->
  <div class="foreground-layer"></div>
</body>
</html>
