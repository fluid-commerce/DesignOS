<!DOCTYPE html>
<!-- archetype: split-photo-feature | target: 1080x1350 (instagram-portrait) -->
<!-- Layout: left column = photo, right column = headline + body + CTA -->
<html lang="en">
<head>
<meta charset="UTF-8"/>
<style>
  body {
    width: 1080px;
    height: 1350px;
    position: relative;
    background: #111;
  }

  /* SLOT: feature-photo */
  .feature-photo {
    position: absolute;
    left: 0;
    top: 0;
    width: 520px;
    height: 1350px;
    overflow: hidden;
    z-index: 2;
  }

  .feature-photo img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  /* SLOT: .category-tag */
  .category-tag {
    position: absolute;
    left: 560px;
    top: 108px;
    font-size: 22px;
    font-weight: 500;
    letter-spacing: 0.18em;
    color: rgba(255, 255, 255, 0.4);
    z-index: 2;
  }

  /* SLOT: .feature-headline */
  .feature-headline {
    position: absolute;
    left: 560px;
    top: 240px;
    width: 452px;
    font-size: 80px;
    font-weight: 900;
    line-height: 0.9;
    letter-spacing: -0.02em;
    color: var(--text-primary);
    z-index: 2;
  }

  /* SLOT: .feature-body */
  .feature-body {
    position: absolute;
    left: 560px;
    top: 660px;
    width: 452px;
    font-size: 30px;
    font-weight: 400;
    line-height: 1.55;
    color: rgba(255, 255, 255, 0.65);
    z-index: 2;
  }

  /* SLOT: .feature-cta */
  .feature-cta {
    position: absolute;
    left: 560px;
    bottom: 108px;
    width: 452px;
    font-size: 26px;
    font-weight: 600;
    letter-spacing: 0.08em;
    color: rgba(255, 255, 255, 0.5);
    z-index: 2;
  }
</style>
</head>
<body>
  <!-- BACKGROUND LAYER: brand fills with textures, brushstrokes -->
  <div class="background-layer"></div>

  <!-- SLOT: feature-photo -->
  <div class="feature-photo">
    <img src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNk+M9QDwADhgGAWjR9awAAAABJRU5ErkJggg==" alt="">
  </div>

  <!-- SLOT: category-tag -->
  <div class="category-tag">NEW ARRIVALS</div>

  <!-- SLOT: feature-headline -->
  <p class="feature-headline">The piece that changes everything</p>

  <!-- SLOT: feature-body -->
  <p class="feature-body">Designed for the in-between moments. Crafted for the ones who move through the world with intention.</p>

  <!-- SLOT: feature-cta -->
  <div class="feature-cta">Shop the collection →</div>

  <!-- FOREGROUND LAYER: brand fills with borders (footer, header, etc.) -->
  <div class="foreground-layer"></div>
</body>
</html>
