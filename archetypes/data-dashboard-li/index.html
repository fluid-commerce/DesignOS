<!DOCTYPE html>
<!-- archetype: data-dashboard-li | target: 1200x627 -->
<html lang="en">
<head>
<meta charset="UTF-8"/>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    width: 1200px;
    height: 627px;
    overflow: hidden;
    background: #111;
    position: relative;
    font-family: sans-serif;
  }

  .decorative-zone {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 0;
  }

  /* SLOT: .eyebrow */
  .eyebrow {
    position: absolute;
    left: 72px;
    right: 72px;
    top: 56px;
    font-size: 20px;
    font-weight: 500;
    letter-spacing: 0.1em;
    color: rgba(255, 255, 255, 0.5);
    text-align: center;
    z-index: 2;
  }

  /* SLOT: .headline */
  .headline {
    position: absolute;
    left: 72px;
    right: 72px;
    top: 86px;
    font-size: 44px;
    font-weight: 700;
    line-height: 1.1;
    color: #ffffff;
    text-align: center;
    z-index: 2;
  }

  .stats-row {
    position: absolute;
    left: 56px;
    right: 56px;
    top: 228px;
    bottom: 100px;
    display: grid;
    grid-template-columns: 1fr 1fr 1fr 1fr;
    gap: 32px;
    z-index: 2;
  }

  .stat-1,
  .stat-2,
  .stat-3,
  .stat-4 {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
  }

  /* SLOT: .stat-1-value */
  .stat-1-value,
  .stat-2-value,
  .stat-3-value,
  .stat-4-value {
    font-size: 86px;
    font-weight: 900;
    line-height: 0.85;
    letter-spacing: -0.03em;
    color: #ffffff;
  }

  /* SLOT: .stat-1-label */
  .stat-1-label,
  .stat-2-label,
  .stat-3-label,
  .stat-4-label {
    font-size: 18px;
    font-weight: 500;
    letter-spacing: 0.08em;
    color: rgba(255, 255, 255, 0.5);
    margin-top: 12px;
  }

  /* SLOT: .footer-cta */
  .footer-cta {
    position: absolute;
    left: 72px;
    right: 72px;
    bottom: 40px;
    font-size: 20px;
    font-weight: 400;
    color: rgba(255, 255, 255, 0.45);
    text-align: center;
    z-index: 2;
  }
</style>
</head>
<body>
  <div class="decorative-zone"></div>

  <!-- SLOT: eyebrow -->
  <p class="eyebrow">Q3 performance snapshot</p>

  <!-- SLOT: headline -->
  <p class="headline">Four numbers that define the quarter</p>

  <div class="stats-row">
    <div class="stat-1">
      <!-- SLOT: stat-1-value -->
      <div class="stat-1-value">2.4x</div>
      <!-- SLOT: stat-1-label -->
      <div class="stat-1-label">ROAS improvement</div>
    </div>
    <div class="stat-2">
      <!-- SLOT: stat-2-value -->
      <div class="stat-2-value">47%</div>
      <!-- SLOT: stat-2-label -->
      <div class="stat-2-label">Cost reduction</div>
    </div>
    <div class="stat-3">
      <!-- SLOT: stat-3-value -->
      <div class="stat-3-value">312K</div>
      <!-- SLOT: stat-3-label -->
      <div class="stat-3-label">New users</div>
    </div>
    <div class="stat-4">
      <!-- SLOT: stat-4-value -->
      <div class="stat-4-value">98%</div>
      <!-- SLOT: stat-4-label -->
      <div class="stat-4-label">Retention rate</div>
    </div>
  </div>

  <!-- SLOT: footer-cta -->
  <p class="footer-cta">Full report in the comments — link below</p>
</body>
</html>
