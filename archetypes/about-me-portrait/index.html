<!DOCTYPE html>
<!-- archetype: about-me-portrait | target: 1080x1350 (instagram-portrait) -->
<!-- Source: Blue_White_Playful_About_Me_Personal + Grey_Beige_Pink_Vintage_About_Me -->
<!-- Layout: portrait photo centered, name top, interest labels scattered, tagline bottom -->
<html lang="en">
<head>
<meta charset="UTF-8"/>
<style>
  body {
    width: 1080px;
    height: 1350px;
    position: relative;
    background: #111;
  }

  /* SLOT: portrait-photo */
  .portrait-photo {
    position: absolute;
    left: 180px;
    top: 200px;
    width: 720px;
    height: 820px;
    overflow: hidden;
    z-index: 2;
    border-radius: 360px 360px 40px 40px;
  }

  .portrait-photo img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  /* SLOT: .person-name */
  .person-name {
    position: absolute;
    left: 0;
    right: 0;
    top: 100px;
    text-align: center;
    font-size: 72px;
    font-weight: 400;
    font-style: italic;
    letter-spacing: -0.01em;
    color: var(--text-primary);
    z-index: 2;
  }

  /* SLOT: .tag-1 */
  .tag-1 {
    position: absolute;
    left: 36px;
    top: 420px;
    font-size: 28px;
    font-weight: 500;
    letter-spacing: 0.08em;
    color: rgba(255, 255, 255, 0.65);
    z-index: 3;
  }

  /* SLOT: .tag-2 */
  .tag-2 {
    position: absolute;
    right: 36px;
    top: 380px;
    font-size: 28px;
    font-weight: 500;
    letter-spacing: 0.08em;
    color: rgba(255, 255, 255, 0.65);
    z-index: 3;
  }

  /* SLOT: .tag-3 */
  .tag-3 {
    position: absolute;
    left: 36px;
    top: 600px;
    font-size: 28px;
    font-weight: 500;
    letter-spacing: 0.08em;
    color: rgba(255, 255, 255, 0.65);
    z-index: 3;
  }

  /* SLOT: .tag-4 */
  .tag-4 {
    position: absolute;
    right: 36px;
    top: 680px;
    font-size: 28px;
    font-weight: 500;
    letter-spacing: 0.08em;
    color: rgba(255, 255, 255, 0.65);
    z-index: 3;
  }

  /* SLOT: .about-tagline */
  .about-tagline {
    position: absolute;
    left: 0;
    right: 0;
    bottom: 120px;
    text-align: center;
    font-size: 30px;
    font-weight: 400;
    line-height: 1.45;
    color: rgba(255, 255, 255, 0.55);
    z-index: 2;
    padding: 0 80px;
  }
</style>
</head>
<body>
  <!-- BACKGROUND LAYER: brand fills with textures, brushstrokes -->
  <div class="background-layer"></div>

  <!-- SLOT: person-name -->
  <div class="person-name">Your Name</div>

  <!-- SLOT: portrait-photo -->
  <div class="portrait-photo">
    <img src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNk+M9QDwADhgGAWjR9awAAAABJRU5ErkJggg==" alt="">
  </div>

  <!-- SLOT: tag-1 -->
  <div class="tag-1">designer</div>

  <!-- SLOT: tag-2 -->
  <div class="tag-2">traveler</div>

  <!-- SLOT: tag-3 -->
  <div class="tag-3">dog parent</div>

  <!-- SLOT: tag-4 -->
  <div class="tag-4">early riser</div>

  <!-- SLOT: about-tagline -->
  <div class="about-tagline">Helping brands find their voice and make it impossible to ignore.</div>

  <!-- FOREGROUND LAYER: brand fills with borders (footer, header, etc.) -->
  <div class="foreground-layer"></div>
</body>
</html>
