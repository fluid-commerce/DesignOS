<!DOCTYPE html>
<!-- archetype: photocentric-quote | target: 1080x1350 (instagram-portrait) -->
<html lang="en">
<head>
<meta charset="UTF-8"/>
<style>
  body {
    width: 1080px;
    height: 1350px;
    position: relative;
    background: #111;
  }

  /* SLOT: photo */
  .photo {
    position: absolute;
    left: 0;
    top: 0;
    width: 1080px;
    height: 760px;
    overflow: hidden;
    z-index: 2;
  }

  .photo img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  /* SLOT: .quote-mark */
  .quote-mark {
    position: absolute;
    left: 68px;
    top: 780px;
    font-size: 120px;
    font-weight: 900;
    line-height: 1;
    color: rgba(255, 255, 255, 0.2);
    z-index: 2;
  }

  /* SLOT: .quote-text */
  .quote-text {
    position: absolute;
    left: 68px;
    top: 870px;
    width: 944px;
    font-size: 52px;
    font-weight: 700;
    line-height: 1.25;
    letter-spacing: -0.01em;
    color: var(--text-primary);
    z-index: 2;
  }

  /* SLOT: .attribution */
  .attribution {
    position: absolute;
    left: 68px;
    bottom: 108px;
    width: 800px;
    font-size: 28px;
    font-weight: 400;
    letter-spacing: 0.05em;
    color: rgba(255, 255, 255, 0.5);
    z-index: 2;
  }
</style>
</head>
<body>
  <!-- BACKGROUND LAYER: brand fills with textures, brushstrokes -->
  <div class="background-layer"></div>

  <!-- SLOT: photo -->
  <div class="photo">
    <img src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNk+M9QDwADhgGAWjR9awAAAABJRU5ErkJggg==" alt="">
  </div>

  <!-- SLOT: quote-mark -->
  <div class="quote-mark">"</div>

  <!-- SLOT: quote-text -->
  <p class="quote-text">The work you do in silence speaks loudest when the results arrive.</p>

  <!-- SLOT: attribution -->
  <p class="attribution">— Sarah Chen, Founder & CEO</p>

  <!-- FOREGROUND LAYER: brand fills with borders (footer, header, etc.) -->
  <div class="foreground-layer"></div>
</body>
</html>
