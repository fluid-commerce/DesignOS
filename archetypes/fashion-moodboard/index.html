<!DOCTYPE html>
<!-- archetype: fashion-moodboard | target: 1080x1350 (instagram-portrait) -->
<!-- Source: Beige_Refined_Elegant_Photo_Collage_Moodboard -->
<!-- Layout: large hero photo top 55%, text zone mid, detail photo strip bottom -->
<html lang="en">
<head>
<meta charset="UTF-8"/>
<style>
  body {
    width: 1080px;
    height: 1350px;
    overflow: hidden;
    position: relative;
    margin: 0;
    padding: 0;
    font-family: sans-serif;
    background: #111;
  }

  .background-layer {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 0;
  }

  .foreground-layer {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 10;
  }

  /* SLOT: hero-photo */
  .hero-photo {
    position: absolute;
    left: 0;
    top: 0;
    width: 1080px;
    height: 660px;
    overflow: hidden;
    z-index: 2;
  }

  .hero-photo img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  /* SLOT: .season-tag */
  .season-tag {
    position: absolute;
    right: 68px;
    top: 36px;
    font-size: 22px;
    font-weight: 500;
    letter-spacing: 0.2em;
    color: rgba(255, 255, 255, 0.6);
    z-index: 3;
  }

  /* SLOT: .quote-overlay */
  .quote-overlay {
    position: absolute;
    left: 68px;
    top: 60px;
    width: 480px;
    font-size: 30px;
    font-weight: 400;
    line-height: 1.5;
    color: rgba(255, 255, 255, 0.7);
    z-index: 3;
  }

  /* SLOT: .script-accent */
  .script-accent {
    position: absolute;
    left: 0;
    right: 0;
    top: 680px;
    text-align: center;
    font-size: 72px;
    font-weight: 400;
    font-style: italic;
    letter-spacing: -0.01em;
    color: rgba(255, 255, 255, 0.55);
    z-index: 2;
  }

  /* SLOT: .collection-word */
  .collection-word {
    position: absolute;
    left: 0;
    right: 0;
    top: 760px;
    text-align: center;
    font-size: 80px;
    font-weight: 700;
    letter-spacing: 0.14em;
    color: #ffffff;
    z-index: 2;
  }

  .detail-strip {
    position: absolute;
    left: 0;
    right: 0;
    bottom: 0;
    height: 280px;
    display: flex;
    gap: 8px;
    z-index: 2;
  }

  .detail-cell {
    flex: 1;
    overflow: hidden;
  }

  .detail-cell img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  /* SLOT: .credits-line */
  .credits-line {
    position: absolute;
    left: 0;
    right: 0;
    bottom: 12px;
    text-align: center;
    font-size: 20px;
    font-weight: 400;
    letter-spacing: 0.12em;
    color: rgba(255, 255, 255, 0.35);
    z-index: 3;
  }
</style>
</head>
<body>
  <!-- BACKGROUND LAYER: brand fills with textures, brushstrokes -->
  <div class="background-layer"></div>

  <!-- SLOT: hero-photo -->
  <div class="hero-photo">
    <img src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNk+M9QDwADhgGAWjR9awAAAABJRU5ErkJggg==" alt="">
  </div>

  <!-- SLOT: season-tag -->
  <div class="season-tag">AUTUMN MOODBOARD</div>

  <!-- SLOT: quote-overlay -->
  <div class="quote-overlay">The season where everything slows to something golden.</div>

  <!-- SLOT: script-accent -->
  <div class="script-accent">Hello</div>

  <!-- SLOT: collection-word -->
  <div class="collection-word">AUTUMN</div>

  <div class="detail-strip">
    <!-- SLOT: detail-photo-1 -->
    <div class="detail-cell">
      <img class="detail-photo-1" src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNk+M9QDwADhgGAWjR9awAAAABJRU5ErkJggg==" alt="">
    </div>
    <!-- SLOT: detail-photo-2 -->
    <div class="detail-cell">
      <img class="detail-photo-2" src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNk+M9QDwADhgGAWjR9awAAAABJRU5ErkJggg==" alt="">
    </div>
    <!-- SLOT: detail-photo-3 -->
    <div class="detail-cell">
      <img class="detail-photo-3" src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNk+M9QDwADhgGAWjR9awAAAABJRU5ErkJggg==" alt="">
    </div>
  </div>

  <!-- SLOT: credits-line -->
  <div class="credits-line">@yourbrand · concept store & creative studio</div>

  <!-- FOREGROUND LAYER: brand fills with borders (footer, header, etc.) -->
  <div class="foreground-layer"></div>
</body>
</html>
