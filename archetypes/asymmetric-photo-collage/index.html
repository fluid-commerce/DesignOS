<!DOCTYPE html>
<!-- archetype: asymmetric-photo-collage | target: 1080x1350 (instagram-portrait) -->
<!-- Source: Grey_Minimal_Photo_Collage_Portrait + Monochrome_Simple layout -->
<!-- Layout: 1 large photo + 2 stacked smaller photos, headline overlay left -->
<html lang="en">
<head>
<meta charset="UTF-8"/>
<style>
  body {
    width: 1080px;
    height: 1350px;
    position: relative;
    background: #111;
  }

  /* SLOT: photo-large */
  .photo-large {
    position: absolute;
    left: 0;
    top: 0;
    width: 660px;
    height: 1350px;
    overflow: hidden;
    z-index: 2;
  }

  .photo-large img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  /* SLOT: photo-small-top */
  .photo-small-top {
    position: absolute;
    right: 0;
    top: 0;
    width: 412px;
    height: 666px;
    overflow: hidden;
    z-index: 2;
  }

  .photo-small-top img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  /* SLOT: photo-small-bottom */
  .photo-small-bottom {
    position: absolute;
    right: 0;
    bottom: 0;
    width: 412px;
    height: 676px;
    overflow: hidden;
    z-index: 2;
  }

  .photo-small-bottom img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .col-gap {
    position: absolute;
    left: 660px;
    top: 0;
    width: 8px;
    height: 1350px;
    background: #111;
    z-index: 2;
  }

  .row-gap {
    position: absolute;
    right: 0;
    top: 666px;
    width: 412px;
    height: 8px;
    background: #111;
    z-index: 2;
  }

  /* SLOT: .headline-overlay */
  .headline-overlay {
    position: absolute;
    left: 40px;
    bottom: 140px;
    width: 580px;
    font-size: 72px;
    font-weight: 900;
    line-height: 0.9;
    letter-spacing: -0.02em;
    color: var(--text-primary);
    z-index: 3;
  }

  /* SLOT: .sub-label */
  .sub-label {
    position: absolute;
    left: 40px;
    bottom: 80px;
    width: 500px;
    font-size: 26px;
    font-weight: 400;
    letter-spacing: 0.1em;
    color: rgba(255, 255, 255, 0.5);
    z-index: 3;
  }
</style>
</head>
<body>
  <!-- BACKGROUND LAYER: brand fills with textures, brushstrokes -->
  <div class="background-layer"></div>

  <!-- SLOT: photo-large -->
  <div class="photo-large">
    <img src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNk+M9QDwADhgGAWjR9awAAAABJRU5ErkJggg==" alt="">
  </div>

  <div class="col-gap"></div>
  <div class="row-gap"></div>

  <!-- SLOT: photo-small-top -->
  <div class="photo-small-top">
    <img src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNk+M9QDwADhgGAWjR9awAAAABJRU5ErkJggg==" alt="">
  </div>

  <!-- SLOT: photo-small-bottom -->
  <div class="photo-small-bottom">
    <img src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNk+M9QDwADhgGAWjR9awAAAABJRU5ErkJggg==" alt="">
  </div>

  <!-- SLOT: headline-overlay -->
  <p class="headline-overlay">New collection arriving</p>

  <!-- SLOT: sub-label -->
  <div class="sub-label">Spring · 2026</div>

  <!-- FOREGROUND LAYER: brand fills with borders (footer, header, etc.) -->
  <div class="foreground-layer"></div>
</body>
</html>
