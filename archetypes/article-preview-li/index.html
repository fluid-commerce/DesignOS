<!DOCTYPE html>
<!-- archetype: article-preview-li | target: 1200x627 -->
<html lang="en">
<head>
<meta charset="UTF-8"/>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    width: 1200px;
    height: 627px;
    overflow: hidden;
    background: #111;
    position: relative;
    font-family: sans-serif;
  }

  .decorative-zone {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 0;
  }

  /* SLOT: .category-label */
  .category-label {
    position: absolute;
    left: 80px;
    top: 72px;
    font-size: 18px;
    font-weight: 500;
    letter-spacing: 0.12em;
    color: rgba(255, 255, 255, 0.5);
    z-index: 2;
  }

  /* SLOT: .article-title */
  .article-title {
    position: absolute;
    left: 80px;
    top: 110px;
    width: 900px;
    font-size: 72px;
    font-weight: 900;
    line-height: 0.92;
    letter-spacing: -0.03em;
    color: #ffffff;
    z-index: 2;
  }

  /* SLOT: .article-excerpt */
  .article-excerpt {
    position: absolute;
    left: 80px;
    bottom: 128px;
    width: 760px;
    font-size: 26px;
    font-weight: 400;
    line-height: 1.45;
    color: rgba(255, 255, 255, 0.45);
    z-index: 2;
  }

  .byline-row {
    position: absolute;
    left: 80px;
    bottom: 64px;
    display: flex;
    align-items: center;
    gap: 12px;
    z-index: 2;
  }

  .byline-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.35);
    flex-shrink: 0;
  }

  /* SLOT: .author-name */
  .author-name {
    font-size: 20px;
    font-weight: 600;
    color: rgba(255, 255, 255, 0.6);
  }
</style>
</head>
<body>
  <div class="decorative-zone"></div>

  <!-- SLOT: category-label -->
  <p class="category-label">Strategy</p>

  <!-- SLOT: article-title -->
  <p class="article-title">Why most brands get retention backwards</p>

  <!-- SLOT: article-excerpt -->
  <p class="article-excerpt">Most companies optimize for acquisition and then wonder why churn stays high. The answer is in the data they already have.</p>

  <div class="byline-row">
    <div class="byline-dot"></div>
    <!-- SLOT: author-name -->
    <p class="author-name">Jordan Kim</p>
  </div>
</body>
</html>
