<!DOCTYPE html>
<!-- archetype: photo-bg-overlay | target: 1080x1080 -->
<html lang="en">
<head>
<meta charset="UTF-8"/>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    width: 1080px;
    height: 1080px;
    overflow: hidden;
    background: #000000;
    position: relative;
    font-family: sans-serif;
  }

  .decorative-zone {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 0;
  }

  /* SLOT: .photo img */
  .photo {
    position: absolute;
    inset: 0;
    z-index: 1;
    background: #2a2a2a;
  }

  .photo img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, rgba(0, 0, 0, 0.8) 0%, rgba(0, 0, 0, 0.2) 60%, transparent 100%);
    z-index: 2;
  }

  /* SLOT: .headline */
  .headline {
    position: absolute;
    left: 68px;
    bottom: 280px;
    width: 900px;
    font-size: 72px;
    line-height: 0.95;
    font-weight: 900;
    color: #ffffff;
    z-index: 3;
  }

  /* SLOT: .subtext */
  .subtext {
    position: absolute;
    left: 68px;
    bottom: 180px;
    width: 700px;
    font-size: 36px;
    font-weight: 400;
    line-height: 1.4;
    color: rgba(255, 255, 255, 0.45);
    z-index: 3;
  }

</style>
</head>
<body>
  <div class="decorative-zone"></div>

  <!-- SLOT: photo -->
  <div class="photo">
    <img src="" alt="Background photo"/>
  </div>

  <div class="overlay"></div>

  <!-- SLOT: headline -->
  <p class="headline">The future of commerce is already here</p>

  <!-- SLOT: subtext -->
  <p class="subtext">And it doesn't look like what you expected.</p>
</body>
</html>
