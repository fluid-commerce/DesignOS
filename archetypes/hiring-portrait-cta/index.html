<!DOCTYPE html>
<!-- archetype: hiring-portrait-cta | target: 1080x1350 (instagram-portrait) -->
<!-- Source: Black_and_Beige_Aesthetic_Job_Hiring_Portrait_Instagram_Post -->
<!-- Layout: badge header, bold headline left, portrait photo right, CTA bottom -->
<html lang="en">
<head>
<meta charset="UTF-8"/>
<style>
  body {
    width: 1080px;
    height: 1350px;
    position: relative;
    background: #111;
  }

  /* SLOT: .badge-text */
  .badge-text {
    position: absolute;
    left: 68px;
    top: 108px;
    font-size: 28px;
    font-weight: 600;
    letter-spacing: 0.14em;
    color: rgba(255, 255, 255, 0.55);
    z-index: 2;
  }

  /* SLOT: .hiring-headline */
  .hiring-headline {
    position: absolute;
    left: 68px;
    top: 220px;
    width: 540px;
    font-size: 120px;
    font-weight: 900;
    line-height: 0.85;
    letter-spacing: -0.02em;
    color: var(--text-primary);
    z-index: 2;
  }

  /* SLOT: team-photo */
  .team-photo {
    position: absolute;
    right: 68px;
    top: 300px;
    width: 420px;
    height: 580px;
    overflow: hidden;
    z-index: 2;
    border-radius: 16px;
  }

  .team-photo img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  /* SLOT: .role-description */
  .role-description {
    position: absolute;
    left: 68px;
    bottom: 260px;
    width: 700px;
    font-size: 34px;
    font-weight: 400;
    line-height: 1.5;
    color: rgba(255, 255, 255, 0.6);
    z-index: 2;
  }

  /* SLOT: .apply-cta */
  .apply-cta {
    position: absolute;
    left: 68px;
    bottom: 108px;
    font-size: 30px;
    font-weight: 600;
    letter-spacing: 0.1em;
    color: rgba(255, 255, 255, 0.5);
    z-index: 2;
  }
</style>
</head>
<body>
  <!-- BACKGROUND LAYER: brand fills with textures, brushstrokes -->
  <div class="background-layer"></div>

  <!-- SLOT: badge-text -->
  <div class="badge-text">WE ARE HIRING</div>

  <!-- SLOT: hiring-headline -->
  <p class="hiring-headline">JOIN OUR TEAM</p>

  <!-- SLOT: team-photo -->
  <div class="team-photo">
    <img src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNk+M9QDwADhgGAWjR9awAAAABJRU5ErkJggg==" alt="">
  </div>

  <!-- SLOT: role-description -->
  <p class="role-description">We are looking for a creative strategist who thinks in systems and communicates in stories.</p>

  <!-- SLOT: apply-cta -->
  <div class="apply-cta">LINK IN BIO TO APPLY →</div>

  <!-- FOREGROUND LAYER: brand fills with borders (footer, header, etc.) -->
  <div class="foreground-layer"></div>
</body>
</html>
