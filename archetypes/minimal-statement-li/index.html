<!DOCTYPE html>
<!-- archetype: minimal-statement-li | target: 1200x627 -->
<html lang="en">
<head>
<meta charset="UTF-8"/>
<style>
  body {
    width: 1200px;
    height: 627px;
  }

  .content {
    position: absolute;
    left: 120px;
    right: 120px;
    top: 50%;
    transform: translateY(-50%);
    display: flex;
    flex-direction: column;
    gap: 24px;
    z-index: 2;
  }

  /* SLOT: .headline */
  .headline {
    font-size: 96px;
    font-weight: 900;
    line-height: 0.88;
    letter-spacing: -0.03em;
    color: var(--text-primary);
  }

  /* SLOT: .supporting-text */
  .supporting-text {
    font-size: 32px;
    font-weight: 500;
    line-height: 1.3;
    color: var(--text-secondary);
  }
</style>
</head>
<body>
  <!-- BACKGROUND LAYER: brand fills with textures, brushstrokes -->
  <div class="background-layer"></div>

  <div class="content">
    <!-- SLOT: headline -->
    <p class="headline">Stop optimizing for vanity metrics</p>

    <!-- SLOT: supporting-text -->
    <p class="supporting-text">Focus on the numbers that actually move revenue.</p>
  </div>
  <!-- FOREGROUND LAYER: brand fills with borders (footer, header, etc.) -->
  <div class="foreground-layer"></div>
</body>
</html>
