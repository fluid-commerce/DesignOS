<!DOCTYPE html>
<!-- archetype: split-photo-quote | target: 1080x1080 -->
<html lang="en">
<head>
<meta charset="UTF-8"/>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    width: 1080px;
    height: 1080px;
    overflow: hidden;
    background: #000000;
    position: relative;
    font-family: sans-serif;
  }

  .background-layer {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 0;
  }
  .foreground-layer {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 10;
  }

  /* SLOT: .photo img */
  .photo {
    position: absolute;
    left: 0;
    top: 0;
    width: 540px;
    height: 1080px;
    overflow: hidden;
    z-index: 1;
    background: #2a2a2a;
  }

  .photo img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .text-panel {
    position: absolute;
    right: 0;
    top: 0;
    width: 540px;
    height: 1080px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 60px;
    z-index: 1;
  }

  .quote-mark {
    font-size: 120px;
    font-weight: 900;
    line-height: 0.6;
    color: rgba(255, 255, 255, 0.15);
    margin-bottom: 16px;
  }

  /* SLOT: .quote-text */
  .quote-text {
    font-size: 44px;
    font-style: italic;
    line-height: 1.3;
    color: #ffffff;
    margin-bottom: 40px;
  }

  .attrib-row {
    display: flex;
    align-items: center;
    gap: 20px;
  }

  /* SLOT: .portrait img */
  .portrait {
    width: 88px;
    height: 88px;
    border-radius: 50%;
    overflow: hidden;
    flex-shrink: 0;
    background: #2a2a2a;
  }

  .portrait img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .attrib-text {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  /* SLOT: .attribution */
  .attribution {
    font-size: 32px;
    font-weight: 700;
    color: #ffffff;
  }

  /* SLOT: .title */
  .title {
    font-size: 28px;
    color: rgba(255, 255, 255, 0.5);
  }
</style>
</head>
<body>
  <!-- BACKGROUND LAYER: brand fills with textures, brushstrokes -->
  <div class="background-layer"></div>

  <!-- SLOT: photo -->
  <div class="photo">
    <img src="" alt="Photo"/>
  </div>

  <div class="text-panel">
    <div class="quote-mark">"</div>

    <!-- SLOT: quote-text -->
    <p class="quote-text">We stopped guessing what works and started measuring it. The difference was immediate.</p>

    <div class="attrib-row">
      <!-- SLOT: portrait -->
      <div class="portrait">
        <img src="" alt="Portrait photo"/>
      </div>

      <div class="attrib-text">
        <!-- SLOT: attribution -->
        <p class="attribution">Sarah Chen</p>

        <!-- SLOT: title -->
        <p class="title">Head of Growth</p>
      </div>
    </div>
  </div>
  <!-- FOREGROUND LAYER: brand fills with borders (footer, header, etc.) -->
  <div class="foreground-layer"></div>
</body>
</html>
