<!DOCTYPE html>
<!-- archetype: quote-testimonial-li | target: 1200x627 -->
<html lang="en">
<head>
<meta charset="UTF-8"/>
<style>
  body {
    width: 1200px;
    height: 627px;
  }

  /* SLOT: .portrait img */
  .portrait {
    position: absolute;
    left: 0;
    top: 0;
    width: 400px;
    height: 627px;
    overflow: hidden;
    background: #2a2a2a;
    z-index: 1;
  }

  .portrait img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .quote-panel {
    position: absolute;
    left: 440px;
    right: 72px;
    top: 0;
    bottom: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 32px;
    z-index: 1;
  }

  /* SLOT: .quote-text */
  .quote-text {
    font-size: 36px;
    font-style: italic;
    font-weight: 400;
    line-height: 1.3;
    color: var(--text-primary);
  }

  .attrib-row {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  /* SLOT: .attribution-name */
  .attribution-name {
    font-size: 26px;
    font-weight: 700;
    color: var(--text-primary);
  }

  /* SLOT: .attribution-title */
  .attribution-title {
    font-size: 20px;
    font-weight: 400;
    color: var(--text-secondary);
  }
</style>
</head>
<body>
  <!-- BACKGROUND LAYER: brand fills with textures, brushstrokes -->
  <div class="background-layer"></div>

  <!-- SLOT: portrait -->
  <div class="portrait">
    <img src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNk+M9QDwADhgGAWjR9awAAAABJRU5ErkJggg==" alt="Portrait photo"/>
  </div>

  <div class="quote-panel">
    <!-- SLOT: quote-text -->
    <p class="quote-text">"The moment we stopped thinking about marketing as a department and started thinking about it as a system, everything changed."</p>

    <div class="attrib-row">
      <!-- SLOT: attribution-name -->
      <p class="attribution-name">Michael Torres</p>

      <!-- SLOT: attribution-title -->
      <p class="attribution-title">VP of Marketing, Acme Corp</p>
    </div>
  </div>
  <!-- FOREGROUND LAYER: brand fills with borders (footer, header, etc.) -->
  <div class="foreground-layer"></div>
</body>
</html>
