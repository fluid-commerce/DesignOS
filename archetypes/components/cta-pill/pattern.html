<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 300px;
      height: 60px;
      background: #111;
      position: relative;
      font-family: sans-serif;
      overflow: hidden;
      display: flex;
      align-items: center;
      padding: 0 8px;
    }

    .cta-pill-wrapper {
      display: inline-flex;
      flex-direction: column;
      justify-content: center;
      gap: 2px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 24px;
      padding: 12px 24px;
    }

    /* SLOT: cta-text */
    .cta-text {
      font-size: 16px;
      font-weight: 600;
      color: #ffffff;
      line-height: 1.2;
    }

    /* SLOT: cta-sub */
    .cta-sub {
      font-size: 12px;
      font-weight: 400;
      color: rgba(255, 255, 255, 0.5);
      line-height: 1.2;
    }
  </style>
</head>
<body>
  <div class="cta-pill-wrapper">
    <!-- SLOT: cta-text -->
    <div class="cta-text">Learn More</div>

    <!-- SLOT: cta-sub -->
    <div class="cta-sub">Available now</div>
  </div>
</body>
</html>
