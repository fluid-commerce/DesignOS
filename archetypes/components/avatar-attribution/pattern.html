<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 400px;
      height: 120px;
      background: #111;
      position: relative;
      font-family: sans-serif;
      overflow: hidden;
      display: flex;
      flex-direction: row;
      align-items: center;
      padding: 16px 24px;
      gap: 16px;
    }

    /* SLOT: avatar */
    .avatar {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      overflow: hidden;
      background: #333;
      flex-shrink: 0;
    }

    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .avatar-info {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    /* SLOT: avatar-name */
    .avatar-name {
      font-size: 18px;
      font-weight: 700;
      color: #ffffff;
      line-height: 1.2;
    }

    /* SLOT: avatar-title */
    .avatar-title {
      font-size: 14px;
      font-weight: 400;
      color: rgba(255, 255, 255, 0.6);
      line-height: 1.3;
    }

    /* SLOT: avatar-handle */
    .avatar-handle {
      font-size: 14px;
      font-weight: 400;
      color: rgba(255, 255, 255, 0.4);
      line-height: 1.3;
    }
  </style>
</head>
<body>
  <!-- SLOT: avatar -->
  <div class="avatar">
    <img src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNk+M9QDwADhgGAWjR9awAAAABJRU5ErkJggg==" alt="Portrait photo">
  </div>

  <div class="avatar-info">
    <!-- SLOT: avatar-name -->
    <div class="avatar-name">Jane Smith</div>

    <!-- SLOT: avatar-title -->
    <div class="avatar-title">VP Product, Acme Corp</div>

    <!-- SLOT: avatar-handle -->
    <div class="avatar-handle">@janesmith</div>
  </div>
</body>
</html>
