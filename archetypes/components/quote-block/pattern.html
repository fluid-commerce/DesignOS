<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 600px;
      height: 400px;
      background: #111;
      position: relative;
      font-family: sans-serif;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 48px;
    }

    /* SLOT: quote-text */
    .quote-text {
      font-size: 32px;
      font-weight: 700;
      color: #ffffff;
      line-height: 1.3;
      border-left: 4px solid rgba(255, 255, 255, 0.2);
      padding-left: 24px;
    }

    /* SLOT: quote-attribution */
    .quote-attribution {
      font-size: 16px;
      font-weight: 400;
      color: rgba(255, 255, 255, 0.6);
      margin-top: 24px;
      padding-left: 28px;
    }
  </style>
</head>
<body>
  <!-- SLOT: quote-text -->
  <div class="quote-text">The real competitive advantage is not having the best product. It's having the fastest iteration speed.</div>

  <!-- SLOT: quote-attribution -->
  <div class="quote-attribution">Sarah Chen, VP Engineering</div>
</body>
</html>
