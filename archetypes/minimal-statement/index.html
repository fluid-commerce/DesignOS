<!DOCTYPE html>
<!-- archetype: minimal-statement | target: 1080x1080 -->
<html lang="en">
<head>
<meta charset="UTF-8"/>
<style>
  body {
    width: 1080px;
    height: 1080px;
  }

  .content {
    position: absolute;
    left: 100px;
    right: 100px;
    top: 50%;
    transform: translateY(-50%);
    display: flex;
    flex-direction: column;
    gap: 28px;
    z-index: 2;
  }

  /* SLOT: .headline */
  .headline {
    font-size: 128px;
    font-weight: 900;
    line-height: 0.85;
    letter-spacing: -0.03em;
    color: var(--text-primary);
  }

  /* SLOT: .subtext */
  .subtext {
    font-size: 48px;
    font-weight: 600;
    line-height: 1.2;
    color: var(--text-secondary);
  }
</style>
</head>
<body>
  <!-- BACKGROUND LAYER: brand fills with textures, brushstrokes -->
  <div class="background-layer"></div>

  <div class="content">
    <!-- SLOT: headline -->
    <p class="headline">Stop optimizing for vanity metrics</p>

    <!-- SLOT: subtext -->
    <p class="subtext">Focus on the numbers that actually move revenue.</p>
  </div>
  <!-- FOREGROUND LAYER: brand fills with borders (footer, header, etc.) -->
  <div class="foreground-layer"></div>
</body>
</html>
