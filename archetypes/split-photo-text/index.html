<!DOCTYPE html>
<!-- archetype: split-photo-text | target: 1080x1080 -->
<html lang="en">
<head>
<meta charset="UTF-8"/>
<style>
  body {
    width: 1080px;
    height: 1080px;
  }

  /* SLOT: .photo img */
  .photo {
    position: absolute;
    left: 0;
    top: 0;
    width: 540px;
    height: 1080px;
    overflow: hidden;
    z-index: 1;
    background: #2a2a2a;
  }

  .photo img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .text-panel {
    position: absolute;
    right: 0;
    top: 0;
    width: 540px;
    height: 1080px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 60px;
    z-index: 1;
  }

  /* SLOT: .headline */
  .headline {
    font-size: 72px;
    font-weight: 900;
    line-height: 0.92;
    color: var(--text-primary);
    margin-bottom: 24px;
  }

  /* SLOT: .body-copy */
  .body-copy {
    font-size: 36px;
    font-weight: 400;
    line-height: 1.4;
    color: var(--text-body);
    margin-bottom: 32px;
  }

</style>
</head>
<body>
  <!-- BACKGROUND LAYER: brand fills with textures, brushstrokes -->
  <div class="background-layer"></div>

  <!-- SLOT: photo -->
  <div class="photo">
    <img src="" alt="Photo"/>
  </div>

  <div class="text-panel">
    <!-- SLOT: headline -->
    <p class="headline">Real results from real brands</p>

    <!-- SLOT: body-copy -->
    <p class="body-copy">We stopped guessing what works and started measuring it. The difference was immediate.</p>
  </div>
  <!-- FOREGROUND LAYER: brand fills with borders (footer, header, etc.) -->
  <div class="foreground-layer"></div>
</body>
</html>
