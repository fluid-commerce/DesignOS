<!DOCTYPE html>
<!-- archetype: split-photo-text | target: 1080x1080 -->
<html lang="en">
<head>
<meta charset="UTF-8"/>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    width: 1080px;
    height: 1080px;
    overflow: hidden;
    background: #111;
    position: relative;
    font-family: sans-serif;
  }

  .decorative-zone {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 0;
  }

  /* SLOT: .photo img */
  .photo {
    position: absolute;
    left: 0;
    top: 0;
    width: 540px;
    height: 1080px;
    overflow: hidden;
    z-index: 1;
  }

  .photo img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .text-panel {
    position: absolute;
    right: 0;
    top: 0;
    width: 540px;
    height: 1080px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 60px;
    z-index: 1;
  }

  /* SLOT: .headline */
  .headline {
    font-size: 56px;
    font-weight: 900;
    line-height: 0.95;
    color: #ffffff;
    margin-bottom: 24px;
  }

  /* SLOT: .body-copy */
  .body-copy {
    font-size: 22px;
    line-height: 1.5;
    color: rgba(255, 255, 255, 0.7);
    margin-bottom: 32px;
  }

  /* SLOT: .attribution */
  .attribution {
    font-size: 20px;
    color: rgba(255, 255, 255, 0.5);
    font-weight: 500;
  }
</style>
</head>
<body>
  <div class="decorative-zone"></div>

  <!-- SLOT: photo -->
  <div class="photo">
    <img src="" alt="Photo"/>
  </div>

  <div class="text-panel">
    <!-- SLOT: headline -->
    <p class="headline">REAL RESULTS FROM REAL BRANDS</p>

    <!-- SLOT: body-copy -->
    <p class="body-copy">We stopped guessing what works and started measuring it. The difference was immediate.</p>

    <!-- SLOT: attribution -->
    <p class="attribution">Sarah Chen, Head of Growth</p>
  </div>
</body>
</html>
